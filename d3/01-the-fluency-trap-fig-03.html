<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI as material risk: S&P 500 disclosures, 2023–2025</title>
  <style>
    :root {
      --color-white:     #FFFFFF;
      --color-ink:       #2a1a0e;
      --color-red:       #C8102E;
      --color-secondary: #545454;
      --color-border:    #D4D4D4;
      --color-ochre:     #C8860E;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --color-white:     #111111;
        --color-ink:       #F0EBE3;
        --color-red:       #E8243A;
        --color-secondary: #A0978C;
        --color-border:    #2E2E2E;
        --color-ochre:     #D49A30;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--color-white); color: var(--color-ink); font-family: 'Inter', -apple-system, 'Helvetica Neue', sans-serif; }
    #chart { width: 100%; }
    .chart-title { font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 700; fill: var(--color-ink); }
    .chart-subtitle { font-family: 'Inter', sans-serif; font-size: 13px; fill: var(--color-secondary); }
    .axis-tick { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: var(--color-secondary); }
    .annotation { font-family: 'Inter', sans-serif; font-size: 12px; fill: var(--color-secondary); }
    .tooltip { position: absolute; pointer-events: none; opacity: 0; background: var(--color-white); border: 1px solid var(--color-border); padding: 6px 9px; font-family: 'Inter', sans-serif; font-size: 13px; color: var(--color-ink); }
    @media (prefers-reduced-motion: reduce) { * { transition: none !important; animation: none !important; } }
  </style>
</head>
<body>
  <div id="chart" role="main"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
  <script>
    const FALLBACK_DATA = [
      { label: '2023', value: 12 },
      { label: '2025', value: 72 },
      { label: 'Late 2025', value: 83 }
    ];

    async function loadData() {
      try { return await d3.json('./01-the-fluency-trap-fig-03/data.json'); }
      catch { return FALLBACK_DATA; }
    }

    const tooltip = d3.select('body').append('div').attr('class', 'tooltip');
    function showTooltip(event, html) {
      tooltip.html(html).style('left', (event.pageX + 12) + 'px').style('top', (event.pageY - 28) + 'px')
        .transition().duration(150).style('opacity', 1);
    }
    function moveTooltip(event) { tooltip.style('left', (event.pageX + 12) + 'px').style('top', (event.pageY - 28) + 'px'); }
    function hideTooltip() { tooltip.transition().duration(100).style('opacity', 0); }

    let chartData = FALLBACK_DATA;

    function draw() {
      d3.select('#chart').selectAll('*').remove();
      const margin = { top: 56, right: 40, bottom: 56, left: 64 };
      const totalWidth = document.getElementById('chart').clientWidth || 700;
      const totalHeight = 420;
      const chartWidth = totalWidth - margin.left - margin.right;
      const chartHeight = totalHeight - margin.top - margin.bottom;

      const svg = d3.select('#chart').append('svg')
        .attr('width', totalWidth).attr('height', totalHeight)
        .attr('role', 'img').attr('aria-labelledby', 'chart-title chart-desc');
      svg.append('title').attr('id', 'chart-title').text('AI as material risk: S&P 500 disclosures, 2023 to 2025');
      svg.append('desc').attr('id', 'chart-desc').text('A single rising line: the share of S&P 500 companies naming AI a material risk climbs from about 12 percent in 2023 to 72 percent in 2025 and 83 percent in the late-2025 update.');

      svg.append('text').attr('class', 'chart-title').attr('x', margin.left).attr('y', 24).text('AI as a material risk in S&P 500 filings');
      svg.append('text').attr('class', 'chart-subtitle').attr('x', margin.left).attr('y', 41).text('Share naming AI a material risk in 10-K filings (Conference Board / ESGAUGE)');

      const gChart = svg.append('g').attr('transform', `translate(${margin.left},${margin.top})`);

      const xScalePoint = d3.scalePoint().domain(chartData.map(d => d.label)).range([0, chartWidth]).padding(0.5);
      const yScaleLinear = d3.scaleLinear().domain([0, 100]).range([chartHeight, 0]);

      const yAxis = gChart.append('g').attr('aria-hidden', 'true');
      yScaleLinear.ticks(5).forEach(t => {
        yAxis.append('line').attr('x1', 0).attr('x2', chartWidth).attr('y1', yScaleLinear(t)).attr('y2', yScaleLinear(t))
          .attr('stroke', 'var(--color-border)').attr('stroke-opacity', 0.6);
        yAxis.append('text').attr('class', 'axis-tick').attr('x', -8).attr('y', yScaleLinear(t) + 4).attr('text-anchor', 'end').text(t + '%');
      });

      // ochre slope band on the steep first segment
      gChart.append('rect')
        .attr('x', xScalePoint(chartData[0].label))
        .attr('y', yScaleLinear(chartData[1].value))
        .attr('width', xScalePoint(chartData[1].label) - xScalePoint(chartData[0].label))
        .attr('height', yScaleLinear(chartData[0].value) - yScaleLinear(chartData[1].value))
        .attr('fill', 'var(--color-ochre)').attr('opacity', 0.12).attr('aria-hidden', 'true');

      const line = d3.line().x(d => xScalePoint(d.label)).y(d => yScaleLinear(d.value));
      gChart.append('path').datum(chartData).attr('fill', 'none')
        .attr('stroke', 'var(--color-red)').attr('stroke-width', 2.5).attr('d', line).attr('aria-hidden', 'true');

      gChart.selectAll('.data-point').data(chartData).join('circle')
        .attr('class', 'data-point')
        .attr('cx', d => xScalePoint(d.label)).attr('cy', d => yScaleLinear(d.value)).attr('r', 5)
        .attr('fill', 'var(--color-ink)').attr('tabindex', 0)
        .attr('aria-label', d => `${d.label}: ${d.value} percent`)
        .on('mouseover', (e, d) => showTooltip(e, `<strong>${d.label}</strong>: ${d.value}%`))
        .on('mousemove', moveTooltip).on('mouseout', hideTooltip);

      gChart.selectAll('.pt-value').data(chartData).join('text')
        .attr('class', 'annotation').attr('text-anchor', 'middle')
        .attr('x', d => xScalePoint(d.label)).attr('y', d => yScaleLinear(d.value) - 12).text(d => d.value + '%');

      gChart.selectAll('.x-tick').data(chartData).join('text')
        .attr('class', 'axis-tick').attr('text-anchor', 'middle')
        .attr('x', d => xScalePoint(d.label)).attr('y', chartHeight + 24).text(d => d.label);

      // "hype becomes liability" callout
      const midX = (xScalePoint(chartData[0].label) + xScalePoint(chartData[1].label)) / 2;
      gChart.append('text').attr('class', 'annotation').attr('text-anchor', 'middle')
        .attr('x', midX).attr('y', yScaleLinear(42)).attr('fill', 'var(--color-ochre)').text('hype becomes liability');
    }

    loadData().then(data => { chartData = data; draw(); });
    const ro = new ResizeObserver(() => draw());
    ro.observe(document.getElementById('chart'));
  </script>
</body>
</html>
