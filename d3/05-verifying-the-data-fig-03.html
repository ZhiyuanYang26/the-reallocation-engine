<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The six-step interrogation procedure</title>
  <style>
    :root {
      --color-white:#FFFFFF; --color-ink:#2a1a0e; --color-red:#C8102E;
      --color-secondary:#545454; --color-border:#D4D4D4; --color-ochre:#C8860E;
      --color-gray:#787878; --color-fill:#F5F5F5;
    }
    @media (prefers-color-scheme: dark) {
      :root { --color-white:#111111; --color-ink:#F0EBE3; --color-red:#E8243A;
        --color-secondary:#A0978C; --color-border:#2E2E2E; --color-ochre:#D49A30;
        --color-gray:#8a8a8a; --color-fill:#1c1c1c; }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--color-white); color: var(--color-ink); font-family: 'Inter', sans-serif; }
    #chart { width: 100%; }
    .chart-title { font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 700; fill: var(--color-ink); }
    .node-text { font-family: 'Inter', sans-serif; font-size: 10px; fill: var(--color-ink); }
    .step-num { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 700; fill: var(--color-secondary); }
    .arc-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; fill: var(--color-secondary); }
    @media (prefers-reduced-motion: reduce) { * { transition: none !important; animation: none !important; } }
  </style>
</head>
<body>
  <div id="chart" role="main"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
  <script>
    const FALLBACK_DATA = [
      'Read metadata, lock prediction',
      'Exploratory analysis',
      'Test metadata vs data',
      'Ask what is NOT in the data',
      'Trace one row end to end',
      'Write epistemic frame, compare'
    ];
    async function loadData() {
      try { return await d3.json('./05-verifying-the-data-fig-03/data.json'); }
      catch { return FALLBACK_DATA; }
    }
    let steps = FALLBACK_DATA;

    function wrapInto(g, txt, cx, cy, maxChars, color) {
      const words = txt.split(/\s+/); let line = '', lines = [];
      words.forEach(w => { if ((line + ' ' + w).trim().length > maxChars) { lines.push(line.trim()); line = w; } else line = (line + ' ' + w).trim(); });
      if (line) lines.push(line);
      const sY = cy - (lines.length - 1) * 6;
      lines.forEach((l, i) => g.append('text').attr('class', 'node-text').attr('x', cx).attr('y', sY + i * 12).attr('text-anchor', 'middle').attr('fill', color || 'var(--color-ink)').text(l));
    }

    function draw() {
      d3.select('#chart').selectAll('*').remove();
      const totalWidth = document.getElementById('chart').clientWidth || 700;
      const svg = d3.select('#chart').append('svg')
        .attr('width', totalWidth).attr('height', 420)
        .attr('viewBox', '0 0 700 420').attr('preserveAspectRatio', 'xMidYMid meet')
        .attr('role', 'img').attr('aria-labelledby', 'chart-title chart-desc');
      svg.append('title').attr('id', 'chart-title').text('The six-step interrogation procedure');
      svg.append('desc').attr('id', 'chart-desc').text('A linear six-step spine with a dashed arc closing from the final compare step back to the locked prediction.');
      svg.append('defs').append('marker').attr('id', 'arrow').attr('markerWidth', 8).attr('markerHeight', 6).attr('refX', 7).attr('refY', 3).attr('orient', 'auto')
        .append('polygon').attr('points', '0 0, 8 3, 0 6').attr('fill', 'var(--color-ink)');

      svg.append('text').attr('class', 'chart-title').attr('x', 24).attr('y', 30).text('The six-step interrogation procedure');

      // 6 nodes in two rows of 3 (snake) for fit
      const nodeW = 170, nodeH = 70;
      const positions = [
        { x: 30,  y: 120 }, { x: 265, y: 120 }, { x: 500, y: 120 },
        { x: 500, y: 250 }, { x: 265, y: 250 }, { x: 30,  y: 250 }
      ];

      steps.forEach((s, i) => {
        const p = positions[i];
        const accent = i === 0;
        svg.append('rect').attr('x', p.x).attr('y', p.y).attr('width', nodeW).attr('height', nodeH).attr('rx', 8)
          .attr('fill', accent ? 'var(--color-red)' : 'var(--color-fill)')
          .attr('stroke', accent ? 'var(--color-red)' : 'var(--color-gray)').attr('stroke-width', 1.2);
        svg.append('text').attr('class', 'step-num').attr('x', p.x + 10).attr('y', p.y + 18).attr('fill', accent ? 'var(--color-white)' : 'var(--color-secondary)').text((i + 1));
        wrapInto(svg, s, p.x + nodeW / 2, p.y + nodeH / 2 + 6, 24, accent ? 'var(--color-white)' : 'var(--color-ink)');
      });

      function arrow(x1, y1, x2, y2) {
        svg.append('line').attr('x1', x1).attr('y1', y1).attr('x2', x2).attr('y2', y2)
          .attr('stroke', 'var(--color-ink)').attr('stroke-width', 1.3).attr('marker-end', 'url(#arrow)').attr('aria-hidden', 'true');
      }
      // top row left to right
      arrow(200, 155, 265, 155);
      arrow(435, 155, 500, 155);
      // down to second row
      arrow(585, 190, 585, 250);
      // bottom row right to left
      arrow(500, 285, 435, 285);
      arrow(265, 285, 200, 285);

      // dashed closing arc from step 6 (bottom-left) back to step 1 (top-left)
      svg.append('path').attr('d', 'M 30 285 Q -10 200 30 130')
        .attr('fill', 'none').attr('stroke', 'var(--color-ink)').attr('stroke-width', 1.2).attr('stroke-dasharray', '5 4')
        .attr('marker-end', 'url(#arrow)').attr('aria-hidden', 'true');
      svg.append('text').attr('class', 'arc-label').attr('x', 10).attr('y', 360).text('compare back to locked prediction');
    }

    loadData().then(data => { steps = data; draw(); });
    const ro = new ResizeObserver(() => draw());
    ro.observe(document.getElementById('chart'));
  </script>
</body>
</html>
