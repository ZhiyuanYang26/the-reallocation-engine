<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The seven-step Form D pipeline across three layers</title>
  <style>
    :root {
      --color-white:     #FFFFFF;
      --color-ink:       #2a1a0e;
      --color-red:       #C8102E;
      --color-secondary: #545454;
      --color-border:    #D4D4D4;
      --color-ochre:     #C8860E;
      --color-fill:      #F5F5F5;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --color-white:     #111111;
        --color-ink:       #F0EBE3;
        --color-red:       #E8243A;
        --color-secondary: #A0978C;
        --color-border:    #2E2E2E;
        --color-ochre:     #D49A30;
        --color-fill:      #1A1A1A;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--color-white); color: var(--color-ink); font-family: 'Inter', -apple-system, 'Helvetica Neue', sans-serif; }
    #chart { width: 100%; }
    .chart-title { font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 700; fill: var(--color-ink); }
    .band-label { font-family: 'Inter', sans-serif; font-size: 11px; fill: var(--color-secondary); letter-spacing: 0.06em; }
    .step-label { font-family: 'Inter', sans-serif; font-size: 10px; fill: var(--color-ink); }
    .source { font-family: 'Inter', sans-serif; font-size: 11px; fill: var(--color-secondary); letter-spacing: 0.08em; }
    .tooltip { position: absolute; pointer-events: none; opacity: 0; background: var(--color-white); border: 1px solid var(--color-border); padding: 6px 10px; font-size: 13px; color: var(--color-ink); }
    @media (prefers-reduced-motion: reduce) { * { transition: none !important; animation: none !important; } }
  </style>
</head>
<body>
  <div id="chart" role="main"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
  <script>
    const FALLBACK_DATA = [
      { step: 1, name: 'download quarters', layer: 'raw' },
      { step: 2, name: 'refresh recent', layer: 'raw' },
      { step: 3, name: 'combine', layer: 'extracted' },
      { step: 4, name: 'filter (threshold)', layer: 'extracted' },
      { step: 5, name: 'unique', layer: 'extracted' },
      { step: 6, name: 'domain inference', layer: 'processed' },
      { step: 7, name: 'flatten (table)', layer: 'processed' }
    ];
    const LAYERS = ['raw', 'extracted', 'processed'];

    const tooltip = d3.select('body').append('div').attr('class', 'tooltip');

    function draw(data) {
      d3.select('#chart').selectAll('*').remove();
      const totalWidth = document.getElementById('chart').clientWidth || 700;
      const totalHeight = Math.round(totalWidth * 0.6);
      const margin = { top: 48, right: 40, bottom: 56, left: 90 };
      const chartWidth = totalWidth - margin.left - margin.right;
      const chartHeight = totalHeight - margin.top - margin.bottom;

      const svg = d3.select('#chart').append('svg')
        .attr('width', totalWidth).attr('height', totalHeight)
        .attr('viewBox', `0 0 ${totalWidth} ${totalHeight}`)
        .attr('role', 'img').attr('aria-labelledby', 'chart-title chart-desc');
      svg.append('title').attr('id', 'chart-title').text('The seven-step Form D pipeline across three layers');
      svg.append('desc').attr('id', 'chart-desc').text('Seven pipeline steps arranged left to right, descending across three horizontal layer bands from raw through extracted to processed, each step accompanied by an audit-receipt marker.');

      svg.append('text').attr('class', 'chart-title').attr('x', margin.left).attr('y', 24).text('The seven-step Form D pipeline across three layers');

      const g = svg.append('g').attr('transform', `translate(${margin.left},${margin.top})`);

      const yBand = d3.scaleBand().domain(LAYERS).range([0, chartHeight]).padding(0.18);
      const xStep = d3.scaleBand().domain(data.map(d => d.step)).range([0, chartWidth]).padding(0.35);

      // bands
      g.selectAll('.band').data(LAYERS).join('rect')
        .attr('class', 'band').attr('aria-hidden', 'true')
        .attr('x', 0).attr('y', d => yBand(d)).attr('width', chartWidth).attr('height', yBand.bandwidth())
        .attr('fill', 'var(--color-fill)').attr('stroke', 'var(--color-border)').attr('stroke-width', 1);

      g.selectAll('.band-label').data(LAYERS).join('text')
        .attr('class', 'band-label')
        .attr('x', -10).attr('y', d => yBand(d) + yBand.bandwidth() / 2 + 4)
        .attr('text-anchor', 'end').text(d => d);

      // arrows between steps (forward)
      const defs = svg.append('defs');
      defs.append('marker').attr('id', 'arrow').attr('markerWidth', 8).attr('markerHeight', 6).attr('refX', 7).attr('refY', 3).attr('orient', 'auto')
        .append('polygon').attr('points', '0 0, 8 3, 0 6').attr('fill', 'var(--color-ink)');

      const cx = d => xStep(d.step) + xStep.bandwidth() / 2;
      const cy = d => yBand(d.layer) + yBand.bandwidth() / 2;

      for (let i = 0; i < data.length - 1; i++) {
        const a = data[i], b = data[i + 1];
        g.append('line').attr('aria-hidden', 'true')
          .attr('x1', cx(a) + 22).attr('y1', cy(a))
          .attr('x2', cx(b) - 24).attr('y2', cy(b))
          .attr('stroke', 'var(--color-ink)').attr('stroke-width', 1).attr('marker-end', 'url(#arrow)');
      }

      // step nodes
      const node = g.selectAll('.step-node').data(data).join('g').attr('class', 'step-node');
      node.append('circle')
        .attr('cx', cx).attr('cy', cy).attr('r', 18)
        .attr('fill', d => d.layer === 'processed' ? 'var(--color-red)' : 'var(--color-white)')
        .attr('stroke', 'var(--color-ink)').attr('stroke-width', 1.5)
        .attr('tabindex', 0).attr('role', 'img')
        .attr('aria-label', d => `Step ${d.step}: ${d.name}, ${d.layer} layer`)
        .on('mouseover', (e, d) => tooltip.html(`<strong>Step ${d.step}</strong>: ${d.name}<br>layer: ${d.layer}`).style('left', (e.pageX + 12) + 'px').style('top', (e.pageY - 28) + 'px').transition().duration(150).style('opacity', 1))
        .on('mousemove', (e) => tooltip.style('left', (e.pageX + 12) + 'px').style('top', (e.pageY - 28) + 'px'))
        .on('mouseout', () => tooltip.transition().duration(100).style('opacity', 0));
      node.append('text')
        .attr('x', cx).attr('y', d => cy(d) + 4).attr('text-anchor', 'middle')
        .attr('font-family', "'JetBrains Mono', monospace").attr('font-size', 12)
        .attr('fill', d => d.layer === 'processed' ? 'var(--color-white)' : 'var(--color-ink)')
        .text(d => d.step);
      // audit-receipt marker
      node.append('rect').attr('aria-hidden', 'true')
        .attr('x', d => cx(d) + 12).attr('y', d => cy(d) + 12).attr('width', 8).attr('height', 10)
        .attr('fill', 'none').attr('stroke', 'var(--color-ochre)').attr('stroke-width', 1.2);
      node.append('text').attr('class', 'step-label')
        .attr('x', cx).attr('y', d => cy(d) + 34).attr('text-anchor', 'middle').text(d => d.name);

      svg.append('text').attr('class', 'source').attr('x', totalWidth - margin.right).attr('y', totalHeight - 12).attr('text-anchor', 'end').text('SOURCE: scripts/sec/ PIPELINE');
    }

    async function loadData() {
      try { return await d3.json('./06-where-the-money-went-sec-form-d-fig-02.json'); }
      catch { return FALLBACK_DATA; }
    }
    loadData().then(data => {
      draw(data);
      const ro = new ResizeObserver(() => draw(data));
      ro.observe(document.getElementById('chart'));
    });
  </script>
</body>
</html>
