<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recency × size beats raise amount</title>
  <style>
    :root {
      --color-white:     #FFFFFF;
      --color-ink:       #2a1a0e;
      --color-red:       #C8102E;
      --color-secondary: #545454;
      --color-border:    #D4D4D4;
      --color-ochre:     #C8860E;
      --color-fill:      #F5F5F5;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --color-white:     #111111;
        --color-ink:       #F0EBE3;
        --color-red:       #E8243A;
        --color-secondary: #A0978C;
        --color-border:    #2E2E2E;
        --color-ochre:     #D49A30;
        --color-fill:      #1A1A1A;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--color-white); color: var(--color-ink); font-family: 'Inter', -apple-system, 'Helvetica Neue', sans-serif; }
    #chart { width: 100%; }
    .chart-title { font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 700; fill: var(--color-ink); }
    .axis-title { font-family: 'Inter', sans-serif; font-size: 12px; fill: var(--color-secondary); }
    .quad-label { font-family: 'Inter', sans-serif; font-size: 11px; fill: var(--color-secondary); }
    .marker-label { font-family: 'Inter', sans-serif; font-size: 11px; fill: var(--color-ink); }
    .source { font-family: 'Inter', sans-serif; font-size: 11px; fill: var(--color-secondary); letter-spacing: 0.08em; }
    .tooltip { position: absolute; pointer-events: none; opacity: 0; background: var(--color-white); border: 1px solid var(--color-border); padding: 6px 10px; font-size: 13px; color: var(--color-ink); }
    @media (prefers-reduced-motion: reduce) { * { transition: none !important; animation: none !important; } }
  </style>
</head>
<body>
  <div id="chart" role="main"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
  <script>
    // recency 0..1 (stale->recent), size 0..1 (small->large)
    const FALLBACK_DATA = [
      { id: 'seed', label: 'small recent seed', recency: 0.82, size: 0.18, target: true },
      { id: 'late', label: 'large recent round', recency: 0.78, size: 0.85, target: false }
    ];

    const tooltip = d3.select('body').append('div').attr('class', 'tooltip');

    function draw(data) {
      d3.select('#chart').selectAll('*').remove();
      const totalWidth = document.getElementById('chart').clientWidth || 700;
      const totalHeight = Math.round(totalWidth * 0.6);
      const margin = { top: 48, right: 40, bottom: 56, left: 64 };
      const chartWidth = totalWidth - margin.left - margin.right;
      const chartHeight = totalHeight - margin.top - margin.bottom;

      const svg = d3.select('#chart').append('svg')
        .attr('width', totalWidth).attr('height', totalHeight)
        .attr('viewBox', `0 0 ${totalWidth} ${totalHeight}`)
        .attr('role', 'img').attr('aria-labelledby', 'chart-title chart-desc');
      svg.append('title').attr('id', 'chart-title').text('Recency by size beats raise amount');
      svg.append('desc').attr('id', 'chart-desc').text('A two-by-two quadrant of funding recency versus company size; the small-and-recent bottom-right quadrant is the target zone, and a large recent round does not outrank a small recent seed.');

      svg.append('text').attr('class', 'chart-title').attr('x', margin.left).attr('y', 24).text('Recency × size beats raise amount');

      const g = svg.append('g').attr('transform', `translate(${margin.left},${margin.top})`);

      const x = d3.scaleLinear().domain([0, 1]).range([0, chartWidth]); // recency
      const y = d3.scaleLinear().domain([0, 1]).range([0, chartHeight]); // size large(top)->small(bottom): size 0 small at bottom

      // target zone fill: bottom-right (recent + small). small = bottom => high y. recent = right => high x
      g.append('rect').attr('aria-hidden', 'true')
        .attr('x', chartWidth / 2).attr('y', chartHeight / 2)
        .attr('width', chartWidth / 2).attr('height', chartHeight / 2)
        .attr('fill', 'var(--color-red)').attr('opacity', 0.10);

      // quadrant divider lines
      g.append('line').attr('aria-hidden', 'true').attr('x1', chartWidth / 2).attr('y1', 0).attr('x2', chartWidth / 2).attr('y2', chartHeight).attr('stroke', 'var(--color-border)').attr('stroke-width', 1);
      g.append('line').attr('aria-hidden', 'true').attr('x1', 0).attr('y1', chartHeight / 2).attr('x2', chartWidth).attr('y2', chartHeight / 2).attr('stroke', 'var(--color-border)').attr('stroke-width', 1);

      // axes box
      g.append('rect').attr('aria-hidden', 'true').attr('x', 0).attr('y', 0).attr('width', chartWidth).attr('height', chartHeight).attr('fill', 'none').attr('stroke', 'var(--color-ink)').attr('stroke-width', 1);

      // axis titles
      g.append('text').attr('class', 'axis-title').attr('x', chartWidth / 2).attr('y', chartHeight + 36).attr('text-anchor', 'middle').text('funding recency  (stale → recent)');
      g.append('text').attr('class', 'axis-title').attr('transform', `translate(-44,${chartHeight / 2}) rotate(-90)`).attr('text-anchor', 'middle').text('company size  (small → large)');

      // quadrant note
      g.append('text').attr('class', 'quad-label').attr('x', chartWidth * 0.75).attr('y', chartHeight * 0.75 + 4).attr('text-anchor', 'middle').attr('fill', 'var(--color-red)').text('target zone');
      g.append('text').attr('class', 'quad-label').attr('x', chartWidth * 0.5).attr('y', 16).attr('text-anchor', 'middle').text('large companies — formal gates, lower value');

      // map size: large top -> y small; small bottom -> y large. data.size 0=small -> y=chartHeight
      const yPos = d => y(1 - d.size);
      const r = d3.scaleSqrt().domain([0, 1]).range([6, 22]);

      const pts = g.selectAll('.pt').data(data).join('circle').attr('class', 'pt')
        .attr('cx', d => x(d.recency)).attr('cy', d => yPos(d))
        .attr('r', d => r(0.5))
        .attr('fill', d => d.target ? 'var(--color-red)' : 'var(--color-secondary)')
        .attr('stroke', 'var(--color-ink)').attr('stroke-width', 1)
        .attr('tabindex', 0).attr('role', 'img')
        .attr('aria-label', d => `${d.label}: ${d.target ? 'target zone' : 'lower-value lead'}`)
        .on('mouseover', (e, d) => tooltip.html(`<strong>${d.label}</strong><br>${d.target ? 'one hire moves the needle' : 'gated by recruiting machinery'}`).style('left', (e.pageX + 12) + 'px').style('top', (e.pageY - 28) + 'px').transition().duration(150).style('opacity', 1))
        .on('mousemove', (e) => tooltip.style('left', (e.pageX + 12) + 'px').style('top', (e.pageY - 28) + 'px'))
        .on('mouseout', () => tooltip.transition().duration(100).style('opacity', 0));

      g.selectAll('.ml').data(data).join('text').attr('class', 'marker-label')
        .attr('x', d => x(d.recency)).attr('y', d => yPos(d) - 16).attr('text-anchor', 'middle').text(d => d.label);

      svg.append('text').attr('class', 'source').attr('x', totalWidth - margin.right).attr('y', totalHeight - 12).attr('text-anchor', 'end').text('SOURCE: SEC FORM D — HIRING SIGNAL');
    }

    async function loadData() {
      try { return await d3.json('./06-where-the-money-went-sec-form-d-fig-03.json'); }
      catch { return FALLBACK_DATA; }
    }
    loadData().then(data => {
      draw(data);
      const ro = new ResizeObserver(() => draw(data));
      ro.observe(document.getElementById('chart'));
    });
  </script>
</body>
</html>
