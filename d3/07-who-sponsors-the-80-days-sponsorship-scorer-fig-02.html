<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weighted score: the ranking flip</title>
  <style>
    :root {
      --color-white:#FFFFFF; --color-ink:#2a1a0e; --color-red:#C8102E;
      --color-secondary:#545454; --color-border:#D4D4D4; --color-ochre:#C8860E; --color-fill:#F5F5F5;
      --color-gray2:#787878;
    }
    @media (prefers-color-scheme: dark) {
      :root { --color-white:#111111; --color-ink:#F0EBE3; --color-red:#E8243A; --color-secondary:#A0978C; --color-border:#2E2E2E; --color-ochre:#D49A30; --color-fill:#1A1A1A; --color-gray2:#9A9A9A; }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--color-white); color: var(--color-ink); font-family: 'Inter', sans-serif; }
    #chart { width: 100%; }
    .chart-title { font-family:'Inter',sans-serif; font-size:16px; font-weight:700; fill:var(--color-ink); }
    .axis-label { font-family:'Inter',sans-serif; font-size:12px; fill:var(--color-ink); }
    .tick { font-family:'JetBrains Mono',monospace; font-size:11px; fill:var(--color-secondary); }
    .legend { font-family:'Inter',sans-serif; font-size:11px; fill:var(--color-ink); }
    .source { font-family:'Inter',sans-serif; font-size:11px; fill:var(--color-secondary); letter-spacing:0.08em; }
    .tooltip { position:absolute; pointer-events:none; opacity:0; background:var(--color-white); border:1px solid var(--color-border); padding:6px 10px; font-size:13px; color:var(--color-ink); }
    @media (prefers-reduced-motion: reduce) { * { transition:none!important; animation:none!important; } }
  </style>
</head>
<body>
  <div id="chart" role="main"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
  <script>
    // segments with weight; "have" indicates whether the company earns that segment
    const SEGMENTS = [
      { key:'filing',   label:'filing rate', weight:0.40, color:'var(--color-red)' },
      { key:'approval', label:'approval rate', weight:0.30, color:'var(--color-secondary)' },
      { key:'recency',  label:'funding recency', weight:0.20, color:'var(--color-ochre)' },
      { key:'size',     label:'company size', weight:0.10, color:'var(--color-gray2)' }
    ];
    const FALLBACK_DATA = [
      { company:'unknown biotech', filing:1, approval:1, recency:1, size:1, tier:'Proven' },
      { company:'famous brand',    filing:0, approval:0, recency:1, size:1, tier:'Avoid' }
    ];
    const tooltip = d3.select('body').append('div').attr('class','tooltip');

    function draw(data) {
      d3.select('#chart').selectAll('*').remove();
      const totalWidth = document.getElementById('chart').clientWidth || 700;
      const totalHeight = Math.round(totalWidth * 0.6);
      const margin = { top: 48, right: 40, bottom: 72, left: 64 };
      const chartWidth = totalWidth - margin.left - margin.right;
      const chartHeight = totalHeight - margin.top - margin.bottom;

      const svg = d3.select('#chart').append('svg')
        .attr('width', totalWidth).attr('height', totalHeight)
        .attr('viewBox', `0 0 ${totalWidth} ${totalHeight}`)
        .attr('role','img').attr('aria-labelledby','chart-title chart-desc');
      svg.append('title').attr('id','chart-title').text('Weighted score: the ranking flip');
      svg.append('desc').attr('id','chart-desc').text('Two stacked bars of weighted score components; the famous brand loses its filing and approval segments — seventy percent — and collapses into the Avoid range.');
      svg.append('text').attr('class','chart-title').attr('x',24).attr('y',24).text('Weighted score: the ranking flip');

      const g = svg.append('g').attr('transform',`translate(${margin.left},${margin.top})`);
      const x = d3.scaleBand().domain(data.map(d=>d.company)).range([0,chartWidth]).padding(0.45);
      const y = d3.scaleLinear().domain([0,1]).range([chartHeight,0]); // zero baseline

      // y axis ticks
      [0,0.25,0.5,0.75,1].forEach(t=>{
        g.append('line').attr('aria-hidden','true').attr('x1',0).attr('x2',chartWidth).attr('y1',y(t)).attr('y2',y(t)).attr('stroke','var(--color-border)').attr('stroke-opacity',0.6).attr('stroke-width',1);
        g.append('text').attr('class','tick').attr('x',-8).attr('y',y(t)+4).attr('text-anchor','end').text(t.toFixed(2));
      });
      g.append('line').attr('aria-hidden','true').attr('x1',0).attr('y1',chartHeight).attr('x2',chartWidth).attr('y2',chartHeight).attr('stroke','var(--color-ink)').attr('stroke-width',1);

      data.forEach(d => {
        let cum = 0;
        SEGMENTS.forEach(seg => {
          const have = d[seg.key] ? seg.weight : 0;
          const y0 = cum, y1 = cum + have;
          cum = y1;
          const empty = !d[seg.key];
          g.append('rect')
            .attr('x', x(d.company)).attr('width', x.bandwidth())
            .attr('y', empty ? y(y0+seg.weight) : y(y1))
            .attr('height', Math.abs(y(0)-y(seg.weight)))
            .attr('fill', empty ? 'none' : seg.color)
            .attr('stroke', empty ? 'var(--color-border)' : 'var(--color-white)')
            .attr('stroke-width', empty ? 1 : 1)
            .attr('stroke-dasharray', empty ? '4 3' : null)
            .attr('opacity', empty ? 0.6 : 1)
            .attr('tabindex',0).attr('role','img')
            .attr('aria-label',`${d.company}, ${seg.label}: ${empty?'absent':'present'}, weight ${seg.weight}`)
            .on('mouseover',(e)=>tooltip.html(`<strong>${d.company}</strong><br>${seg.label} (${seg.weight})<br>${empty?'absent — contributes 0':'present'}`).style('left',(e.pageX+12)+'px').style('top',(e.pageY-28)+'px').transition().duration(150).style('opacity',1))
            .on('mousemove',(e)=>tooltip.style('left',(e.pageX+12)+'px').style('top',(e.pageY-28)+'px'))
            .on('mouseout',()=>tooltip.transition().duration(100).style('opacity',0));
          // for empty segments, keep cum advancing so the bar position is honest about where 70% would be
          if (empty) cum = y0 + seg.weight;
        });
        g.append('text').attr('class','axis-label').attr('x',x(d.company)+x.bandwidth()/2).attr('y',chartHeight+20).attr('text-anchor','middle').text(d.company);
        g.append('text').attr('class','axis-label').attr('x',x(d.company)+x.bandwidth()/2).attr('y',chartHeight+36).attr('text-anchor','middle').attr('fill','var(--color-secondary)').attr('font-size',11).text('→ '+d.tier);
      });

      // legend
      const lg = svg.append('g').attr('transform',`translate(${margin.left},${totalHeight-14})`);
      let lx=0;
      SEGMENTS.forEach(seg=>{
        lg.append('rect').attr('x',lx).attr('y',-10).attr('width',11).attr('height',11).attr('fill',seg.color);
        lg.append('text').attr('class','legend').attr('x',lx+16).attr('y',0).text(seg.label);
        lx += seg.label.length*6.5 + 36;
      });

      svg.append('text').attr('class','source').attr('x',totalWidth-margin.right).attr('y',totalHeight-2).attr('text-anchor','end').text('SOURCE: SPONSORSHIP SCORER WEIGHTS');
    }

    async function loadData() {
      try { return await d3.json('./07-who-sponsors-the-80-days-sponsorship-scorer-fig-02.json'); }
      catch { return FALLBACK_DATA; }
    }
    loadData().then(data => { draw(data); new ResizeObserver(()=>draw(data)).observe(document.getElementById('chart')); });
  </script>
</body>
</html>
