<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The spam-filter analogy: three behavioral fingerprints</title>
  <style>
    :root {
      --color-white:#FFFFFF; --color-ink:#2a1a0e; --color-red:#C8102E;
      --color-secondary:#545454; --color-border:#D4D4D4; --color-ochre:#C8860E; --color-fill:#F5F5F5;
    }
    @media (prefers-color-scheme: dark) {
      :root { --color-white:#111111; --color-ink:#F0EBE3; --color-red:#E8243A; --color-secondary:#A0978C; --color-border:#2E2E2E; --color-ochre:#D49A30; --color-fill:#1A1A1A; }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--color-white); color: var(--color-ink); font-family: 'Inter', sans-serif; }
    #chart { width: 100%; }
    .chart-title { font-family:'Inter',sans-serif; font-size:16px; font-weight:700; fill:var(--color-ink); }
    .col-head { font-family:'Inter',sans-serif; font-size:12px; font-weight:700; fill:var(--color-ink); }
    .row-tag { font-family:'Inter',sans-serif; font-size:10px; fill:var(--color-secondary); letter-spacing:0.06em; }
    .source { font-family:'Inter',sans-serif; font-size:11px; fill:var(--color-secondary); letter-spacing:0.08em; }
    .tooltip { position:absolute; pointer-events:none; opacity:0; background:var(--color-white); border:1px solid var(--color-border); padding:6px 10px; font-size:13px; color:var(--color-ink); }
    @media (prefers-reduced-motion: reduce) { * { transition:none!important; animation:none!important; } }
  </style>
</head>
<body>
  <div id="chart" role="main"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
  <script>
    const FALLBACK_DATA = [
      { head:'temporal anomalies', spam:'3am bulk send', posting:'unchanged 8+ weeks' },
      { head:'interaction voids', spam:'no replies, no clicks', posting:'no portal activity' },
      { head:'textual homogeneity', spam:'reused message', posting:'description reused across listings' }
    ];
    const tooltip = d3.select('body').append('div').attr('class','tooltip');

    function draw(data) {
      d3.select('#chart').selectAll('*').remove();
      const totalWidth = document.getElementById('chart').clientWidth || 700;
      const totalHeight = Math.round(totalWidth * 0.6);
      const margin = { top: 56, right: 24, bottom: 56, left: 24 };
      const chartWidth = totalWidth - margin.left - margin.right;

      const svg = d3.select('#chart').append('svg')
        .attr('width', totalWidth).attr('height', totalHeight)
        .attr('viewBox', `0 0 ${totalWidth} ${totalHeight}`)
        .attr('role','img').attr('aria-labelledby','chart-title chart-desc');
      svg.append('title').attr('id','chart-title').text('The spam-filter analogy: three behavioral fingerprints');
      svg.append('desc').attr('id','chart-desc').text('Three columns — temporal anomalies, interaction voids, textual homogeneity — each pairing an email-spam example with a job-posting example.');
      svg.append('text').attr('class','chart-title').attr('x',24).attr('y',24).text('The spam-filter analogy: three behavioral fingerprints');

      const g = svg.append('g').attr('transform',`translate(${margin.left},${margin.top})`);
      const colW = chartWidth/3;
      const chipH = 52, gap = 14, rowY1 = 36, rowY2 = rowY1 + chipH + gap;

      data.forEach((d,i)=>{
        const cx = i*colW + 8, cw = colW - 16;
        g.append('text').attr('class','col-head').attr('x',cx+cw/2).attr('y',16).attr('text-anchor','middle').text(d.head);

        // spam chip (row 1)
        g.append('rect').attr('x',cx).attr('y',rowY1).attr('width',cw).attr('height',chipH)
          .attr('fill','var(--color-fill)').attr('stroke','var(--color-secondary)').attr('stroke-width',1)
          .attr('tabindex',0).attr('role','img').attr('aria-label',`${d.head}, email spam: ${d.spam}`)
          .on('mouseover',(e)=>tooltip.html(`<strong>email spam</strong><br>${d.spam}`).style('left',(e.pageX+12)+'px').style('top',(e.pageY-28)+'px').transition().duration(150).style('opacity',1))
          .on('mousemove',(e)=>tooltip.style('left',(e.pageX+12)+'px').style('top',(e.pageY-28)+'px'))
          .on('mouseout',()=>tooltip.transition().duration(100).style('opacity',0));
        g.append('foreignObject').attr('x',cx+6).attr('y',rowY1+4).attr('width',cw-12).attr('height',chipH-8)
          .append('xhtml:div').style('font-family',"'Inter',sans-serif").style('font-size','11px').style('text-align','center').style('color','var(--color-ink)').style('display','flex').style('align-items','center').style('justify-content','center').style('height','100%').html(d.spam);

        // posting chip (row 2)
        g.append('rect').attr('x',cx).attr('y',rowY2).attr('width',cw).attr('height',chipH)
          .attr('fill','var(--color-white)').attr('stroke','var(--color-red)').attr('stroke-width',1.4)
          .attr('tabindex',0).attr('role','img').attr('aria-label',`${d.head}, job posting: ${d.posting}`)
          .on('mouseover',(e)=>tooltip.html(`<strong>job posting</strong><br>${d.posting}`).style('left',(e.pageX+12)+'px').style('top',(e.pageY-28)+'px').transition().duration(150).style('opacity',1))
          .on('mousemove',(e)=>tooltip.style('left',(e.pageX+12)+'px').style('top',(e.pageY-28)+'px'))
          .on('mouseout',()=>tooltip.transition().duration(100).style('opacity',0));
        g.append('foreignObject').attr('x',cx+6).attr('y',rowY2+4).attr('width',cw-12).attr('height',chipH-8)
          .append('xhtml:div').style('font-family',"'Inter',sans-serif").style('font-size','11px').style('text-align','center').style('color','var(--color-ink)').style('display','flex').style('align-items','center').style('justify-content','center').style('height','100%').html(d.posting);
      });

      // row tags
      g.append('text').attr('class','row-tag').attr('x',0).attr('y',rowY1-4).text('email spam');
      g.append('text').attr('class','row-tag').attr('x',0).attr('y',rowY2-4).text('job posting');

      svg.append('text').attr('class','source').attr('x',totalWidth-margin.right).attr('y',totalHeight-12).attr('text-anchor','end').text('SOURCE: SCORE BEHAVIOR, NOT CONTENT');
    }

    async function loadData() {
      try { return await d3.json('./08-is-the-job-real-ats-detection-and-liveness-fig-02.json'); }
      catch { return FALLBACK_DATA; }
    }
    loadData().then(data => { draw(data); new ResizeObserver(()=>draw(data)).observe(document.getElementById('chart')); });
  </script>
</body>
</html>
