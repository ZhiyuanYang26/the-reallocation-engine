<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The compact row: three role-quality features</title>
  <style>
    :root {
      --color-white:#FFFFFF; --color-ink:#2a1a0e; --color-red:#C8102E;
      --color-secondary:#545454; --color-border:#D4D4D4; --color-ochre:#C8860E; --color-fill:#F5F5F5;
      --color-gray2:#787878;
    }
    @media (prefers-color-scheme: dark) {
      :root { --color-white:#111111; --color-ink:#F0EBE3; --color-red:#E8243A; --color-secondary:#A0978C; --color-border:#2E2E2E; --color-ochre:#D49A30; --color-fill:#1A1A1A; --color-gray2:#9A9A9A; }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--color-white); color: var(--color-ink); font-family: 'Inter', sans-serif; }
    #chart { width: 100%; }
    .chart-title { font-family:'Inter',sans-serif; font-size:16px; font-weight:700; fill:var(--color-ink); }
    .panel-head { font-family:'Inter',sans-serif; font-size:12px; font-weight:600; fill:var(--color-ink); }
    .small { font-family:'Inter',sans-serif; font-size:10px; fill:var(--color-secondary); }
    .source { font-family:'Inter',sans-serif; font-size:11px; fill:var(--color-secondary); letter-spacing:0.08em; }
    .tooltip { position:absolute; pointer-events:none; opacity:0; background:var(--color-white); border:1px solid var(--color-border); padding:6px 10px; font-size:13px; color:var(--color-ink); }
    @media (prefers-reduced-motion: reduce) { * { transition:none!important; animation:none!important; } }
  </style>
</head>
<body>
  <div id="chart" role="main"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
  <script>
    const FALLBACK_DATA = {
      trend: [0.6,0.65,0.72,0.78,0.85],
      wage: { p10:0.25, p25:0.42, p50:0.58, p75:0.74, p90:0.9 },
      jobZone: 4
    };
    const tooltip = d3.select('body').append('div').attr('class','tooltip');

    function draw(data) {
      d3.select('#chart').selectAll('*').remove();
      const totalWidth = document.getElementById('chart').clientWidth || 700;
      const totalHeight = Math.round(totalWidth * 0.62);
      const svg = d3.select('#chart').append('svg')
        .attr('width', totalWidth).attr('height', totalHeight)
        .attr('viewBox', `0 0 ${totalWidth} ${totalHeight}`)
        .attr('role','img').attr('aria-labelledby','chart-title chart-desc');
      svg.append('title').attr('id','chart-title').text('The compact row: three role-quality features');
      svg.append('desc').attr('id','chart-desc').text('One compact occupation row decomposes into an employment trend, a wage band at five percentiles, and a job-zone ladder, with the alternate-title list attached above as the confirmation feed.');
      svg.append('text').attr('class','chart-title').attr('x',24).attr('y',24).text('The compact row: three role-quality features');

      const W=totalWidth, H=totalHeight;
      const defs = svg.append('defs');
      defs.append('marker').attr('id','arrow').attr('markerWidth',8).attr('markerHeight',6).attr('refX',7).attr('refY',3).attr('orient','auto')
        .append('polygon').attr('points','0 0, 8 3, 0 6').attr('fill','var(--color-ink)');

      // alternate-title feed (top)
      svg.append('rect').attr('x',W*0.5-110).attr('y',44).attr('width',220).attr('height',28)
        .attr('fill','var(--color-fill)').attr('stroke','var(--color-ochre)').attr('stroke-width',1.4);
      svg.append('text').attr('class','small').attr('x',W*0.5).attr('y',62).attr('text-anchor','middle').attr('fill','var(--color-ink)').text('alternate-title list (confirmation feed)');

      // compact row band
      const rowY=92;
      svg.append('rect').attr('x',W*0.12).attr('y',rowY).attr('width',W*0.76).attr('height',30)
        .attr('fill','var(--color-white)').attr('stroke','var(--color-ink)').attr('stroke-width',1.5);
      svg.append('text').attr('class','panel-head').attr('x',W*0.5).attr('y',rowY+20).attr('text-anchor','middle').text('one compact occupation row');
      svg.append('line').attr('aria-hidden','true').attr('x1',W*0.5).attr('y1',72).attr('x2',W*0.5).attr('y2',rowY-2).attr('stroke','var(--color-ochre)').attr('stroke-width',1.2).attr('marker-end','url(#arrow)');

      const panelY = rowY+62, panelH = H-panelY-48;
      const pW = W*0.26, gap=(W*0.76 - 3*pW)/2, startX=W*0.12;
      const px = [startX, startX+pW+gap, startX+2*(pW+gap)];

      px.forEach((x,i)=>{
        svg.append('line').attr('aria-hidden','true').attr('x1',W*0.5).attr('y1',rowY+32).attr('x2',x+pW/2).attr('y2',panelY-2).attr('stroke','var(--color-ink)').attr('stroke-width',1).attr('marker-end','url(#arrow)');
        svg.append('rect').attr('x',x).attr('y',panelY).attr('width',pW).attr('height',panelH)
          .attr('fill','var(--color-white)').attr('stroke','var(--color-border)').attr('stroke-width',1);
      });

      // Panel 1: trend line
      const t = data.trend;
      const tx = d3.scaleLinear().domain([0,t.length-1]).range([px[0]+14, px[0]+pW-14]);
      const ty = d3.scaleLinear().domain([0,1]).range([panelY+panelH-30, panelY+30]);
      const line = d3.line().x((d,i)=>tx(i)).y(d=>ty(d));
      svg.append('path').datum(t).attr('d',line).attr('fill','none').attr('stroke','var(--color-red)').attr('stroke-width',2)
        .attr('tabindex',0).attr('role','img').attr('aria-label','employment trend rising across survey years');
      svg.append('text').attr('class','panel-head').attr('x',px[0]+pW/2).attr('y',panelY+18).attr('text-anchor','middle').text('employment trend');

      // Panel 2: wage band percentiles
      const wp=['p10','p25','p50','p75','p90'];
      const wx = d3.scaleBand().domain(wp).range([px[1]+12,px[1]+pW-12]).padding(0.25);
      const wy = d3.scaleLinear().domain([0,1]).range([panelY+panelH-30, panelY+30]);
      wp.forEach(k=>{
        svg.append('rect').attr('x',wx(k)).attr('y',wy(data.wage[k])).attr('width',wx.bandwidth()).attr('height',(panelY+panelH-30)-wy(data.wage[k]))
          .attr('fill','var(--color-ink)')
          .attr('tabindex',0).attr('role','img').attr('aria-label',`wage ${k}: ${Math.round(data.wage[k]*100)} of 100`)
          .on('mouseover',(e)=>tooltip.html(`<strong>${k}</strong>: ${Math.round(data.wage[k]*100)}/100`).style('left',(e.pageX+12)+'px').style('top',(e.pageY-28)+'px').transition().duration(150).style('opacity',1))
          .on('mousemove',(e)=>tooltip.style('left',(e.pageX+12)+'px').style('top',(e.pageY-28)+'px'))
          .on('mouseout',()=>tooltip.transition().duration(100).style('opacity',0));
      });
      svg.append('text').attr('class','panel-head').attr('x',px[1]+pW/2).attr('y',panelY+18).attr('text-anchor','middle').text('wage band');

      // Panel 3: job zone ladder
      const steps=5;
      const sx=px[2]+pW/2, sw=pW*0.5;
      const sy0=panelY+panelH-30, stepH=(panelH-60)/steps;
      for(let s=0;s<steps;s++){
        const active = s < data.jobZone;
        svg.append('rect').attr('x',sx-sw/2).attr('y',sy0-(s+1)*stepH+4).attr('width',sw).attr('height',stepH-4)
          .attr('fill', active?'var(--color-ochre)':'var(--color-fill)').attr('stroke','var(--color-secondary)').attr('stroke-width',1)
          .attr('opacity',active?1:0.5);
      }
      svg.append('text').attr('class','panel-head').attr('x',px[2]+pW/2).attr('y',panelY+18).attr('text-anchor','middle').text('job zone');

      svg.append('text').attr('class','source').attr('x',W-40).attr('y',H-12).attr('text-anchor','end').text('SOURCE: O*NET + OEWS COMPACT ROW');
    }

    async function loadData() {
      try { return await d3.json('./09-is-the-role-any-good-bls-onet-role-quality-fig-02.json'); }
      catch { return FALLBACK_DATA; }
    }
    loadData().then(data => { draw(data); new ResizeObserver(()=>draw(data)).observe(document.getElementById('chart')); });
  </script>
</body>
</html>
