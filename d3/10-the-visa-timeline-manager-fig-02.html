<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Three windows of an international student's runway</title>
  <style>
    :root {
      --color-white:#FFFFFF; --color-ink:#2a1a0e; --color-red:#C8102E;
      --color-secondary:#545454; --color-border:#D4D4D4; --color-ochre:#C8860E; --color-fill:#F5F5F5;
      --color-gray2:#787878;
    }
    @media (prefers-color-scheme: dark) {
      :root { --color-white:#111111; --color-ink:#F0EBE3; --color-red:#E8243A; --color-secondary:#A0978C; --color-border:#2E2E2E; --color-ochre:#D49A30; --color-fill:#1A1A1A; --color-gray2:#9A9A9A; }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--color-white); color: var(--color-ink); font-family: 'Inter', sans-serif; }
    #chart { width: 100%; }
    .chart-title { font-family:'Inter',sans-serif; font-size:16px; font-weight:700; fill:var(--color-ink); }
    .bar-label { font-family:'Inter',sans-serif; font-size:11px; fill:var(--color-ink); }
    .tick { font-family:'JetBrains Mono',monospace; font-size:10px; fill:var(--color-secondary); }
    .source { font-family:'Inter',sans-serif; font-size:11px; fill:var(--color-secondary); letter-spacing:0.08em; }
    .tooltip { position:absolute; pointer-events:none; opacity:0; background:var(--color-white); border:1px solid var(--color-border); padding:6px 10px; font-size:13px; color:var(--color-ink); }
    @media (prefers-reduced-motion: reduce) { * { transition:none!important; animation:none!important; } }
  </style>
</head>
<body>
  <div id="chart" role="main"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
  <script>
    // start/end normalized 0..1 on a shared time axis; markers as fractions
    const FALLBACK_DATA = [
      { label:'OPT window', start:0, end:0.42, color:'var(--color-gray2)', markers:[{at:0.42,name:'90-day ceiling'}] },
      { label:'STEM extension', start:0.42, end:0.95, color:'var(--color-ink)', markers:[{at:0.78,name:'150-day ceiling'}] },
      { label:'H-1B lottery', start:0.55, end:0.70, color:'var(--color-ochre)', markers:[{at:0.55,name:'registration'},{at:0.70,name:'cap-subject start'}] }
    ];
    const tooltip = d3.select('body').append('div').attr('class','tooltip');

    function draw(data) {
      d3.select('#chart').selectAll('*').remove();
      const totalWidth = document.getElementById('chart').clientWidth || 700;
      const totalHeight = Math.round(totalWidth * 0.55);
      const margin = { top: 56, right: 40, bottom: 56, left: 130 };
      const chartWidth = totalWidth - margin.left - margin.right;
      const chartHeight = totalHeight - margin.top - margin.bottom;

      const svg = d3.select('#chart').append('svg')
        .attr('width', totalWidth).attr('height', totalHeight)
        .attr('viewBox', `0 0 ${totalWidth} ${totalHeight}`)
        .attr('role','img').attr('aria-labelledby','chart-title chart-desc');
      svg.append('title').attr('id','chart-title').text('Three windows of an international student runway');
      svg.append('desc').attr('id','chart-desc').text('Three stacked windows — OPT, STEM extension, H-1B lottery — on a shared time axis; the runway is their combination.');
      svg.append('text').attr('class','chart-title').attr('x',24).attr('y',24).text("Three windows of an international student's runway");

      const g = svg.append('g').attr('transform',`translate(${margin.left},${margin.top})`);
      const x = d3.scaleLinear().domain([0,1]).range([0,chartWidth]);
      const yB = d3.scaleBand().domain(data.map(d=>d.label)).range([0,chartHeight]).padding(0.35);

      g.append('line').attr('aria-hidden','true').attr('x1',0).attr('y1',chartHeight).attr('x2',chartWidth).attr('y2',chartHeight).attr('stroke','var(--color-border)');

      data.forEach(d=>{
        g.append('text').attr('class','bar-label').attr('x',-10).attr('y',yB(d.label)+yB.bandwidth()/2+4).attr('text-anchor','end').text(d.label);
        g.append('rect').attr('x',x(d.start)).attr('y',yB(d.label)).attr('width',x(d.end)-x(d.start)).attr('height',yB.bandwidth())
          .attr('fill',d.color).attr('stroke','var(--color-ink)').attr('stroke-width',0.8)
          .attr('tabindex',0).attr('role','img').attr('aria-label',`${d.label} window`)
          .on('mouseover',(e)=>tooltip.html(`<strong>${d.label}</strong>`).style('left',(e.pageX+12)+'px').style('top',(e.pageY-28)+'px').transition().duration(150).style('opacity',1))
          .on('mousemove',(e)=>tooltip.style('left',(e.pageX+12)+'px').style('top',(e.pageY-28)+'px'))
          .on('mouseout',()=>tooltip.transition().duration(100).style('opacity',0));
        d.markers.forEach(m=>{
          g.append('line').attr('x1',x(m.at)).attr('x2',x(m.at)).attr('y1',yB(d.label)-4).attr('y2',yB(d.label)+yB.bandwidth()+4).attr('stroke','var(--color-red)').attr('stroke-width',1.4);
          g.append('text').attr('class','tick').attr('x',x(m.at)).attr('y',yB(d.label)-8).attr('text-anchor','middle').attr('fill','var(--color-ink)').text(m.name);
        });
      });

      svg.append('text').attr('class','source').attr('x',totalWidth-margin.right).attr('y',totalHeight-12).attr('text-anchor','end').text('SOURCE: RUNWAY = COMBINATION OF ALL THREE');
    }

    async function loadData() {
      try { return await d3.json('./10-the-visa-timeline-manager-fig-02.json'); }
      catch { return FALLBACK_DATA; }
    }
    loadData().then(data => { draw(data); new ResizeObserver(()=>draw(data)).observe(document.getElementById('chart')); });
  </script>
</body>
</html>
