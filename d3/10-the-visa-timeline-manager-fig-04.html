<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timeline-factor decision tree</title>
  <style>
    :root {
      --color-white:#FFFFFF; --color-ink:#2a1a0e; --color-red:#C8102E;
      --color-secondary:#545454; --color-border:#D4D4D4; --color-ochre:#C8860E; --color-fill:#F5F5F5;
    }
    @media (prefers-color-scheme: dark) {
      :root { --color-white:#111111; --color-ink:#F0EBE3; --color-red:#E8243A; --color-secondary:#A0978C; --color-border:#2E2E2E; --color-ochre:#D49A30; --color-fill:#1A1A1A; }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--color-white); color: var(--color-ink); font-family: 'Inter', sans-serif; }
    #chart { width: 100%; }
    .chart-title { font-family:'Inter',sans-serif; font-size:16px; font-weight:700; fill:var(--color-ink); }
    .edge-label { font-family:'JetBrains Mono',monospace; font-size:10px; fill:var(--color-secondary); }
    .source { font-family:'Inter',sans-serif; font-size:11px; fill:var(--color-secondary); letter-spacing:0.08em; }
    .tooltip { position:absolute; pointer-events:none; opacity:0; background:var(--color-white); border:1px solid var(--color-border); padding:6px 10px; font-size:13px; color:var(--color-ink); }
    @media (prefers-reduced-motion: reduce) { * { transition:none!important; animation:none!important; } }
  </style>
</head>
<body>
  <div id="chart" role="main"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
  <script>
    const FALLBACK_DATA = {
      root: 'factor computed',
      branches: [
        { edge:'= 0', label:'skip regardless — reallocate time', color:'var(--color-red)', textLight:true },
        { edge:'low > 0', label:'apply only if strong elsewhere AND acceleration possible', color:'var(--color-ochre)', textLight:false },
        { edge:'high', label:'no timeline objection — let other factors decide', color:'var(--color-ink)', textLight:true }
      ],
      advisor: 'verify uncertain eligibility with a qualified advisor'
    };
    const tooltip = d3.select('body').append('div').attr('class','tooltip');

    function boxAt(svg,x,y,w,h,fill,stroke,label,light){
      svg.append('rect').attr('x',x-w/2).attr('y',y-h/2).attr('width',w).attr('height',h)
        .attr('fill',fill).attr('stroke',stroke).attr('stroke-width',1.5)
        .attr('tabindex',0).attr('role','img').attr('aria-label',label)
        .on('mouseover',(e)=>tooltip.html(`<strong>${label}</strong>`).style('left',(e.pageX+12)+'px').style('top',(e.pageY-28)+'px').transition().duration(150).style('opacity',1))
        .on('mousemove',(e)=>tooltip.style('left',(e.pageX+12)+'px').style('top',(e.pageY-28)+'px'))
        .on('mouseout',()=>tooltip.transition().duration(100).style('opacity',0));
      svg.append('foreignObject').attr('x',x-w/2+4).attr('y',y-h/2+4).attr('width',w-8).attr('height',h-8)
        .append('xhtml:div').style('font-family',"'Inter',sans-serif").style('font-size','10px').style('text-align','center').style('color',light?'var(--color-white)':'var(--color-ink)').style('display','flex').style('align-items','center').style('justify-content','center').style('height','100%').html(label);
    }

    function draw(data) {
      d3.select('#chart').selectAll('*').remove();
      const totalWidth = document.getElementById('chart').clientWidth || 700;
      const totalHeight = Math.round(totalWidth * 0.6);
      const svg = d3.select('#chart').append('svg')
        .attr('width', totalWidth).attr('height', totalHeight)
        .attr('viewBox', `0 0 ${totalWidth} ${totalHeight}`)
        .attr('role','img').attr('aria-labelledby','chart-title chart-desc');
      svg.append('title').attr('id','chart-title').text('Timeline-factor decision tree');
      svg.append('desc').attr('id','chart-desc').text('From a computed factor, three branches: zero skips, low-but-positive applies conditionally, high has no timeline objection; an advisor-check node handles uncertain eligibility.');
      svg.append('text').attr('class','chart-title').attr('x',24).attr('y',24).text('Timeline-factor decision tree');

      const defs = svg.append('defs');
      defs.append('marker').attr('id','arrow').attr('markerWidth',8).attr('markerHeight',6).attr('refX',7).attr('refY',3).attr('orient','auto')
        .append('polygon').attr('points','0 0, 8 3, 0 6').attr('fill','var(--color-ink)');

      const W=totalWidth, rootX=W*0.5, rootY=70;
      const termY = totalHeight*0.66;
      const xs = [W*0.20, W*0.5, W*0.80];

      // root
      boxAt(svg,rootX,rootY,150,40,'var(--color-fill)','var(--color-ink)',data.root,false);

      data.branches.forEach((b,i)=>{
        svg.append('line').attr('aria-hidden','true').attr('x1',rootX).attr('y1',rootY+20).attr('x2',xs[i]).attr('y2',termY-30).attr('stroke','var(--color-ink)').attr('stroke-width',1.3).attr('marker-end','url(#arrow)');
        svg.append('text').attr('class','edge-label').attr('x',(rootX+xs[i])/2).attr('y',(rootY+termY)/2-4).attr('text-anchor','middle').text(b.edge);
        boxAt(svg,xs[i],termY+18,176,64,b.color,'var(--color-ink)',b.label,b.textLight);
      });

      // advisor check (side node off the conditional branch)
      const advX=W*0.5, advY=totalHeight-30;
      svg.append('line').attr('aria-hidden','true').attr('x1',xs[1]).attr('y1',termY+50).attr('x2',advX).attr('y2',advY-14).attr('stroke','var(--color-secondary)').attr('stroke-width',1).attr('stroke-dasharray','4 3').attr('marker-end','url(#arrow)');
      boxAt(svg,advX,advY,260,30,'var(--color-white)','var(--color-secondary)',data.advisor,false);

      svg.append('text').attr('class','source').attr('x',W-40).attr('y',totalHeight-6).attr('text-anchor','end').text('SOURCE: PLANNING MULTIPLIER, NOT LEGAL ADVICE');
    }

    async function loadData() {
      try { return await d3.json('./10-the-visa-timeline-manager-fig-04.json'); }
      catch { return FALLBACK_DATA; }
    }
    loadData().then(data => { draw(data); new ResizeObserver(()=>draw(data)).observe(document.getElementById('chart')); });
  </script>
</body>
</html>
