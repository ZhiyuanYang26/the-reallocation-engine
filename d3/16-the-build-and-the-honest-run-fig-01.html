<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Six build phases: AI executes, you verify</title>
<style>
  :root {
    --color-white:#FFFFFF; --color-ink:#2a1a0e; --color-red:#C8102E;
    --color-secondary:#545454; --color-border:#D4D4D4; --color-ochre:#C8860E; --color-fill:#F5F5F5; --color-applyfill:#FBECEE;
  }
  @media (prefers-color-scheme: dark) {
    :root { --color-white:#111111; --color-ink:#F0EBE3; --color-red:#E8243A;
      --color-secondary:#A0978C; --color-border:#2E2E2E; --color-ochre:#D49A30; --color-fill:#1A1A1A; --color-applyfill:#2A1416; }
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--color-white); color:var(--color-ink); font-family:'Inter',-apple-system,sans-serif; }
  #chart { width:100%; }
  @media (prefers-reduced-motion: reduce) { * { transition:none!important; animation:none!important; } }
</style>
</head>
<body>
<div id="chart" role="main"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script>
const FALLBACK_DATA = [
  { n:1, name:'Foundation', ai:'scaffold structure', you:'intake answers' },
  { n:2, name:'Skeleton',   ai:'schemas, stubs',     you:'encode your situation' },
  { n:3, name:'Integration',ai:'wire components',    you:'gates not votes' },
  { n:4, name:'Features',    ai:'build each pipeline',you:'verify vs real data' },
  { n:5, name:'Hardening',   ai:'errors, audits',    you:'define "correct"' },
  { n:6, name:'Release',     ai:'first run',         you:'' }
];
function draw() {
  d3.select('#chart').selectAll('*').remove();
  const css = getComputedStyle(document.documentElement); const C = n => css.getPropertyValue(n).trim();
  const w = document.getElementById('chart').clientWidth || 700;
  const svg = d3.select('#chart').append('svg').attr('width',w).attr('height',360)
    .attr('viewBox','0 0 700 360').attr('preserveAspectRatio','xMidYMid meet')
    .attr('role','img').attr('aria-labelledby','t d');
  svg.append('title').attr('id','t').text('Six build phases: AI executes, you verify');
  svg.append('desc').attr('id','d').text('Six phases each with an AI-executes row and a you-verify row, separated by handoff conditions.');
  svg.append('defs').append('marker').attr('id','a').attr('markerWidth',8).attr('markerHeight',8).attr('refX',6).attr('refY',4).attr('orient','auto')
    .append('path').attr('d','M0,0 L8,4 L0,8 Z').attr('fill',C('--color-secondary'));

  svg.append('text').attr('x',16).attr('y',70).attr('font-size',11).attr('font-weight',700).attr('fill',C('--color-red')).text('AI executes');
  svg.append('text').attr('x',16).attr('y',200).attr('font-size',11).attr('font-weight',700).attr('fill',C('--color-ink')).text('You verify');

  const bw = 86, gap = 10, x0 = 100;
  FALLBACK_DATA.forEach((d,i)=>{
    const x = x0 + i*(bw+gap);
    const release = d.n===6;
    svg.append('text').attr('x',x+bw/2).attr('y',60).attr('text-anchor','middle').attr('font-size',9).attr('font-weight',700).attr('fill',C('--color-secondary')).text(d.n+' '+d.name);
    svg.append('rect').attr('x',x).attr('y',74).attr('width',bw).attr('height',44).attr('fill',C('--color-applyfill')).attr('stroke',C('--color-red'));
    svg.append('text').attr('x',x+bw/2).attr('y',100).attr('text-anchor','middle').attr('font-size',10).attr('fill',C('--color-ink')).text(d.ai);
    if(d.you){
      svg.append('rect').attr('x',x).attr('y',210).attr('width',bw).attr('height',44).attr('fill',C('--color-fill')).attr('stroke',C('--color-ink'));
      svg.append('text').attr('x',x+bw/2).attr('y',236).attr('text-anchor','middle').attr('font-size',10).attr('fill',C('--color-ink')).text(d.you);
    }
    if(i<FALLBACK_DATA.length-1) svg.append('line').attr('x1',x+bw).attr('y1',160).attr('x2',x+bw+gap-1).attr('y2',160).attr('stroke',C('--color-secondary')).attr('marker-end','url(#a)');
  });
  svg.append('text').attr('x',360).attr('y',150).attr('text-anchor','middle').attr('font-size',9).attr('fill',C('--color-ochre')).text('handoff condition between every phase');

  svg.append('line').attr('x1',40).attr('y1',300).attr('x2',660).attr('y2',300).attr('stroke',C('--color-ochre')).attr('stroke-width',2).attr('aria-hidden','true');
  svg.append('text').attr('x',350).attr('y',328).attr('text-anchor','middle').attr('font-family',"'EB Garamond',Georgia,serif").attr('font-style','italic').attr('font-size',13).attr('fill',C('--color-ink'))
    .text("A handoff you can't state precisely is a phase you haven't finished.");
}
draw();
new ResizeObserver(()=>draw()).observe(document.getElementById('chart'));
</script>
</body>
</html>
