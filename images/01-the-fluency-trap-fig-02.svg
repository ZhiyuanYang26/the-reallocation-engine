  <title id="fig-title-02">What predicts comprehension: checking, not typing</title>
  <desc>Three vertical bars of comprehension-quiz scores. Hand-coders at about 67 percent and AI users who interrogated the model at about 65 percent sit at nearly the same height, joined by a faint reference line; AI users who delegated to the model drop sharply below 40 percent. The two high bars share a behavior — the human kept checking — not a typing method.</desc>
