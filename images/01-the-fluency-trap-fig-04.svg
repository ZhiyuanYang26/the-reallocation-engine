<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-04">
  <title id="fig-title-04">The OPT cumulative-unemployment clock</title>
  <desc>One horizontal authorization bar with uniform day ticks. A leading segment shows accumulated unemployment days. A dashed marker sets the working limit at eighty days; a solid hard-stop marker at ninety days marks where the immigration record is terminated with no grace period. The gap between them is the safety margin.</desc>
  <metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="The Reallocation Engine" book-slug="the-reallocation-engine" chapter="01-the-fluency-trap" figure-number="04" figure-title="The OPT cumulative-unemployment clock" figure-slug="opt-unemployment-clock" figure-type="timeline / progression (annotated horizontal bar)" priority="Critical" author="Nik Bear Brown" date-generated="2026-06-15" source-file="pantry/01-the-fluency-trap-cajal.md"/></metadata>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2a1a0e"/></marker>
  </defs>

  <rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>
  <text x="32" y="40" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#2a1a0e">The OPT cumulative-unemployment clock</text>

  <!-- Bar geometry: x 64..636 over 0..90 days. px/day = 572/90 = 6.356 -->
