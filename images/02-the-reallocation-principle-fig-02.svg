  <title id="fig-title-02">The 3-3-2 day</title>
  <desc>Three proportional columns on a common baseline showing how an eight-hour search day is reallocated: targeted applying at two hours is the shortest column, networking at three hours, and portfolio at three hours. Effort has moved away from applying toward networking and portfolio work.</desc>
