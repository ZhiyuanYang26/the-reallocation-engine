<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-01">
<title id="fig-title-01">The three-tier trust stack</title>
<desc>A three-tier vertical stack. A wide foundation tier (numbers trace to real records) supports a middle working tier (are the right things measured) which supports a narrow top tier (trustworthy inference). An ascent arrow on the left marks the build, and a danger-zone callout spans the gap between the bottom two tiers where coverage gaps, name-matching failures, and base-rate mismatch live.</desc>
<metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="The Reallocation Engine" book-slug="the-reallocation-engine" chapter="05-verifying-the-data" figure-number="01" figure-title="The three-tier trust stack" figure-slug="three-tier-trust-stack" figure-type="hierarchy" priority="Important" author="Nik Bear Brown" date-generated="2026-06-15" source-file="pantry/05-verifying-the-data-cajal.md"/></metadata>
