<title id="fig-title-02">Name-matching fragmentation</title>
<desc>Three small employer-name buckets — variants of one firm such as Google LLC, Google Inc., and Alphabet — sit inside a dotted boundary marking them as a single legal filer. A single arrow points right to one consolidated node showing the true aggregated filing count, visibly larger than any individual bucket. The rows are real; grouping by raw name treats one sponsor as three small unrelated companies.</desc>
