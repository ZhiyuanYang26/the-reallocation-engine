<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-03">
<title id="fig-title-03">The six-step interrogation procedure</title>
<desc>Six sequential steps for interrogating a dataset before relying on it: read metadata and lock a prediction; run exploratory analysis; test metadata against the data; ask what is not in the data; trace one row end to end; write the epistemic frame and compare to the locked prediction. A dashed reference arc connects the final compare step back to the locked prediction, closing the loop between expectation and finding.</desc>
<metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="The Reallocation Engine" book-slug="the-reallocation-engine" chapter="05-verifying-the-data" figure-number="03" figure-title="The six-step interrogation procedure" figure-slug="six-step-interrogation-procedure" figure-type="flowchart" priority="Important" author="Nik Bear Brown" date-generated="2026-06-15" source-file="pantry/05-verifying-the-data-cajal.md"/></metadata>
<defs><marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2a1a0e"/></marker></defs>

<text x="32" y="40" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#2a1a0e">The six-step interrogation procedure</text>

