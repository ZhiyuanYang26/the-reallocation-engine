<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-04">
<title id="fig-title-04">Base rate pulls the posterior down</title>
<desc>A horizontal probability axis from zero to one carries three markers: a low base-rate prior near 0.08 at the left, the raw scorer output at 0.68 toward the right, and the corrected posterior landing around 0.40 between them. A correction arrow runs leftward from the raw output to the posterior; a faint anchor line from the prior shows it pulling the score down. The headline raw score overstates the real probability once the prior is applied.</desc>
<metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="The Reallocation Engine" book-slug="the-reallocation-engine" chapter="05-verifying-the-data" figure-number="04" figure-title="Base rate pulls the posterior down" figure-slug="base-rate-posterior" figure-type="statistical" priority="Critical" author="Nik Bear Brown" date-generated="2026-06-15" source-file="pantry/05-verifying-the-data-cajal.md"/></metadata>
