<title id="fig-title-01">The Form D corpus and the funded subset</title>
<desc>A large outer rectangle represents roughly 568,000 companies that filed Form D reporting they raised money. A smaller nested rectangle, a little under half its area, represents the roughly 247,000 that raised at least five million dollars. The scale is enormous and largely unexamined by job seekers, and a meaningful but smaller portion clears a serious funding bar.</desc>
