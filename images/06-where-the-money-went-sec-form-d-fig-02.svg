<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-02">
<title id="fig-title-02">The seven-step Form D pipeline across three layers</title>
<desc>Seven sequential steps turn raw filings into a usable funded-company table, descending through three horizontal data layers: raw, extracted, processed. The steps are download quarters, refresh recent quarters, combine quarters, filter to real offerings above a funding threshold, collapse to one record per company, infer web domains, and flatten to the final table. Each step writes an audit receipt alongside its output.</desc>
