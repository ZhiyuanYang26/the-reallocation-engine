<title id="fig-title-03">Recency and size beat raise amount</title>
<desc>A two-by-two quadrant map. The horizontal axis runs from stale funding on the left to recent funding on the right; the vertical axis runs from large companies at top to small companies at bottom. The bottom-right quadrant — small and recently funded — is the emphasized target zone where one hire matters and a founder reads your email. A small recent seed sits in that target zone while a large recent late-stage round sits in the lower-value top-right, showing a bigger raise does not win.</desc>
