<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-04">
<title id="fig-title-04">Domain inference: where the pipeline stops and you begin</title>
<desc>A single horizontal bar splits funded companies by whether the pipeline could automatically find their website. The larger left segment, about sixty-two percent, is the share whose domain was inferred successfully. The smaller right segment, about thirty-eight percent, is the manual-lookup queue requiring a human to locate the site. The remainder is emphasized as the handoff point where automation ends and human effort earns its return — often the least-contested leads.</desc>
