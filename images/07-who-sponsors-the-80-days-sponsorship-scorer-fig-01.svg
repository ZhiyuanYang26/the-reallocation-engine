<title id="fig-title-01">Three records into one score</title>
<desc>Three public datasets feed a single sponsorship scorer, joined on resolved company identity. SEC Form D contributes funding recency, the DOL labor-condition-application disclosure contributes filing behavior, and the USCIS H-1B approval-outcomes record contributes approval rate. A fourth, minor company-size signal feeds in from below on a thinner arrow. The score is a join of three primary records plus a light size input collapsing into one node.</desc>
