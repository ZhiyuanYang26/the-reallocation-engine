<title id="fig-title-02">Weighted score: the ranking flip</title>
<desc>Two side-by-side stacked bars assemble the composite sponsorship score from four weighted segments: filing rate at forty percent, approval rate at thirty percent, funding recency at twenty percent, and company size at ten percent. The unknown biotech bar fills all four segments and reaches the proven range. The famous-brand bar leaves the filing-rate and approval-rate segments — seventy percent of the behavior terms — hollow, so it collapses into the avoid range. Funding and size alone cannot rescue it.</desc>
