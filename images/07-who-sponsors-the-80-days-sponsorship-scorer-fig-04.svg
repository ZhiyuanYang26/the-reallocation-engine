<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-04">
<title id="fig-title-04">Why a company is Unknown: three causes, three responses</title>
<desc>A top-to-bottom disambiguation tree resolves why a company landed in the Unknown tier. From an Unknown entry node a coverage decision asks whether join coverage is low. A low-coverage branch flags a likely name-match artifact and routes to resolving the entity and re-running the join. The matched-but-empty branch is a true absence — never sponsored or too young — and routes to seeking direct sponsorship signals such as a careers-page note or a recruiter question. Unknown is never read as Avoid.</desc>
