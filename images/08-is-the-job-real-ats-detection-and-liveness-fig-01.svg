<title id="fig-title-01">Ghost-job prevalence holds across years</title>
<desc>A scatter chart with a time axis from 2019 to 2024 and a prevalence axis from zero to fifty percent. A horizontal shaded band spanning twenty-eight to forty-two percent marks the structural prevalence range. Several study points cluster in or near the band across the years, with two visible outliers below it, showing prevalence is a persistent structural feature rather than a cyclical blip. No trend line is drawn.</desc>
