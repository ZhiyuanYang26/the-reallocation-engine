<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-02">
<title id="fig-title-02">The spam-filter analogy: three behavioral fingerprints</title>
<desc>Three parallel columns map spam detection onto ghost-job detection across three behavioral fingerprints: temporal anomalies, interaction voids, and textual homogeneity. Each column stacks an upper email-spam example over a lower job-posting example. Temporal anomalies pair a 3am bulk send with an unchanged posting; interaction voids pair no replies with no portal activity; textual homogeneity pairs a reused message with a description copied across listings. Both detectors score behavior, not content.</desc>
