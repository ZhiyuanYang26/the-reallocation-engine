<title id="fig-title-03">Five signals to one classification</title>
<desc>Five posting signals — posting age, last-updated date, sibling-listing activity (the most diagnostic, emphasized), description specificity, and active-search context — feed a single liveness classifier. The classifier fans out to three terminal calls: live, ghost, and investigate, where investigate is the honest mixed-signal response. Five behavioral observations resolve into one of three actions.</desc>
