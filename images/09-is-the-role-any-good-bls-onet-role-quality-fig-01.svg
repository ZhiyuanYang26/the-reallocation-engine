<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-01">
<title id="fig-title-01">Title-to-occupation resolution pipeline</title>
<desc>A horizontal process flowchart turns a messy job-posting title into a labor-market fact. The raw posting title flows to a node where a language model proposes a candidate occupation code, then to a verification node that checks the proposed code's alternate-title list against the posting. A confirmed path proceeds to a compact joined occupation row uniting the occupational-information source and the wage-and-employment source, from which three role-quality features are read. A rejected path loops back to re-propose a new code. Proposing is not confirming.</desc>
<metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="The Reallocation Engine" book-slug="the-reallocation-engine" chapter="09-is-the-role-any-good-bls-onet-role-quality" figure-number="01" figure-title="Title-to-occupation resolution pipeline" figure-slug="title-occupation-resolution-pipeline" figure-type="flowchart" priority="Critical" author="Nik Bear Brown" date-generated="2026-06-15" source-file="pantry/09-is-the-role-any-good-bls-onet-role-quality-cajal.md"/></metadata>
