<line x1="160" y1="188" x2="194" y2="188" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="316" y1="188" x2="338" y2="188" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
