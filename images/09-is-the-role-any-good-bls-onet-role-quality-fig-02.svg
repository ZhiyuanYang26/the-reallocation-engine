<title id="fig-title-02">The compact row: three role-quality features</title>
<desc>One compact occupation row, shown as a horizontal band, fans down into three parallel feature panels. The first panel is an employment-trend line across survey years; the second is a wage band marked at five percentile positions; the third is a five-step job-zone preparation ladder. An attached alternate-title list above the band feeds the confirmation, signaling the row is only trustworthy once the title is matched.</desc>
