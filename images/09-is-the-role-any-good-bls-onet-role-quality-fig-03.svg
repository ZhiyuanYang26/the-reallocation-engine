<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-03">
<title id="fig-title-03">The silent wrong-occupation error</title>
<desc>Two panels share a zero-based wage scale. On the left, an ambiguous posting title points to a plausible but wrong occupation code whose attached wage band sits at a modest level, with a blocking marker because the alternate-title list does not contain the posting's described work. On the right, the same posting is correctly re-classified to the occupation whose alternate-title list does contain the work, with a higher wage band and steeper preparation profile and a confirmation marker. The gap between the two bands is the cost of skipping the check.</desc>
