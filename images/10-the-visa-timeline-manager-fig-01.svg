<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-01">
<title id="fig-title-01">The calendar gate: process past authorization</title>
<desc>A horizontal hiring timeline advances through five stages — application submitted, phone screen, technical rounds, panel, offer — connected by forward arrows. A single bold vertical line marks the moment authorization ends, falling between technical rounds and offer. Everything to the right of the line, including the offer, is rendered in a muted, unreachable treatment. An offer arriving after the line is worthless before any number is computed.</desc>
