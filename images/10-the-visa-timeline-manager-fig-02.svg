<text x="408" y="234" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">cap-subject start</text>

<text x="430" y="384" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">the true runway is the combination of all three windows, not just the first</text>
