<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-04">
<title id="fig-title-04">Timeline-factor decision tree</title>
<desc>A top-down decision tree begins from a computed timeline factor and branches by value into three terminal outcomes. A factor of zero leads to skip-regardless and reallocate the freed time. A low-but-positive factor leads to apply only if strong on the other factors and an accelerated process is genuinely possible. A high factor leads to no timeline objection, let the other factors decide. A human-judgment check node flags that any uncertain eligibility question is verified with a qualified advisor rather than resolved by the system.</desc>
<metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="The Reallocation Engine" book-slug="the-reallocation-engine" chapter="10-the-visa-timeline-manager" figure-number="04" figure-title="Timeline-factor decision tree" figure-slug="timeline-factor-decision-tree" figure-type="flowchart" priority="Important" author="Nik Bear Brown" date-generated="2026-06-15" source-file="pantry/10-the-visa-timeline-manager-cajal.md"/></metadata>
<defs><marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2a1a0e"/></marker></defs>

<text x="32" y="40" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#2a1a0e">Timeline-factor decision tree</text>

<!-- root -->
<rect x="290" y="64" width="140" height="48" rx="0" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1.5"/>
<text x="360" y="86" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">timeline factor</text>
<text x="360" y="102" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">computed</text>

<!-- branch labels -->
<text x="150" y="148" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="10" fill="#545454">factor = 0</text>
<text x="360" y="148" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="10" fill="#545454">low &gt; 0</text>
<text x="570" y="148" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="10" fill="#545454">high</text>

<!-- branch arrows -->
<path d="M 290 96 L 150 96 L 150 162" fill="none" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="360" y1="112" x2="360" y2="162" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
<path d="M 430 96 L 570 96 L 570 162" fill="none" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- terminal: skip (blocking, highlighted) -->
<rect x="60" y="166" width="180" height="80" rx="0" fill="#FFFFFF" stroke="#C8102E" stroke-width="2"/>
<text x="150" y="194" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">skip regardless</text>
<text x="150" y="214" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">reallocate the</text>
<text x="150" y="228" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">freed time</text>

<!-- terminal: conditional (neutral) -->
<rect x="270" y="166" width="180" height="80" rx="0" fill="#FFFFFF" stroke="#787878" stroke-width="1" stroke-dasharray="5 4"/>
<text x="360" y="190" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">apply only if</text>
<text x="360" y="206" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">strong elsewhere</text>
<text x="360" y="222" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">AND acceleration</text>
<text x="360" y="236" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">is possible</text>

<!-- terminal: clear (neutral) -->
<rect x="480" y="166" width="180" height="80" rx="0" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1"/>
<text x="570" y="198" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">no timeline</text>
<text x="570" y="214" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">objection</text>
<text x="570" y="230" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">let other factors decide</text>

<!-- advisor-check side node -->
<rect x="270" y="300" width="180" height="60" rx="0" fill="#F5F5F5" stroke="#2a1a0e" stroke-width="1"/>
<text x="360" y="326" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">uncertain eligibility?</text>
<text x="360" y="344" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">verify with a qualified advisor</text>
<line x1="360" y1="246" x2="360" y2="298" stroke="#2a1a0e" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<line x1="150" y1="246" x2="324" y2="306" stroke="#2a1a0e" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<text x="360" y="392" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">the system never resolves a legal eligibility question on its own</text>
</svg>
