  <text x="644" y="227" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">skip</text>

  <!-- legend / caption -->
  <text x="32" y="320" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#2a1a0e">Votes add in proportion to weight. Gates multiply.</text>
  <text x="32" y="340" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#545454">A closed gate drives the composite to zero, overriding any vote magnitude.</text>

  <line x1="32" y1="356" x2="60" y2="356" stroke="#C8102E" stroke-width="6"/>
  <text x="68" y="360" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">heavier connector = larger weight</text>
  <line x1="320" y1="356" x2="348" y2="356" stroke="#2a1a0e" stroke-width="3"/>
  <text x="356" y="360" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">lighter connector = smaller weight</text>
