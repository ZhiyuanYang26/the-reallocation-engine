  <text x="246" y="220" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">sum</text>

  <!-- gate 1: liveness -->
  <line x1="270" y1="176" x2="320" y2="176" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <polygon points="324,156 360,176 324,196" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1.5"/>
