<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-01">
  <title id="fig-title-01">The Composite: Votes, Gates, and Threshold</title>
  <desc>Two weighted votes — a dominant sponsorship vote and a lighter fit vote — sum, then pass through two multiplicative gates (liveness, timeline). A closed gate collapses the result toward zero. The output meets a threshold that branches into apply, consider, or skip.</desc>
  <metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="The Reallocation Engine" book-slug="the-reallocation-engine" chapter="11-the-bayesian-role-scorer" figure-number="01" figure-title="The Composite: Votes, Gates, and Threshold" figure-slug="composite-votes-gates-threshold" figure-type="systems diagram" priority="Critical" author="Nik Bear Brown" date-generated="2026-06-15" source-file="pantry/11-the-bayesian-role-scorer-cajal.md"/></metadata>
