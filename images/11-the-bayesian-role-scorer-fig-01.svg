  <line x1="560" y1="176" x2="612" y2="176" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="560" y1="186" x2="612" y2="222" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>

