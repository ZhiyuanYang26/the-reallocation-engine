  <text x="92" y="246" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">vote</text>

  <!-- weighted connectors to summing junction (thickness encodes weight) -->
  <line x1="152" y1="121" x2="222" y2="166" stroke="#C8102E" stroke-width="6" marker-end="url(#arrow)"/>
  <line x1="152" y1="231" x2="222" y2="186" stroke="#2a1a0e" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- summing junction -->
  <circle cx="246" cy="176" r="24" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1.5"/>
  <line x1="246" y1="160" x2="246" y2="192" stroke="#2a1a0e" stroke-width="1.5"/>
