  <title id="fig-title-02">Same Candidate, Same Fit: Sponsorship Decides</title>
  <desc>Two roles with identical fit, liveness, and timeline factors. The left role has high sponsorship and its composite clears the threshold to apply; the right role has near-zero sponsorship and its composite falls below to skip. Only the sponsorship term changed.</desc>
