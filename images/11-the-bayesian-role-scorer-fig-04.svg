  <text x="525" y="278" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">no traceable line back to any source</text>

  <text x="350" y="356" text-anchor="middle" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#2a1a0e">Provenance is the difference: a recommendation you can follow back, or one you cannot.</text>
