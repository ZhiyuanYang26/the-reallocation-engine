<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-04">
  <title id="fig-title-04">Auditable vs. Opaque Scorer</title>
  <desc>Left column: an auditable scorer whose recommendation traces back through stated weights to named sources — a record, a model judgment, a user input. Right column: an opaque scorer whose recommendation emerges from a sealed box trained on past decisions, with no traceable provenance.</desc>
  <metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="The Reallocation Engine" book-slug="the-reallocation-engine" chapter="11-the-bayesian-role-scorer" figure-number="04" figure-title="Auditable vs. Opaque Scorer" figure-slug="auditable-vs-opaque" figure-type="comparison panels" priority="Supplementary" author="Nik Bear Brown" date-generated="2026-06-15" source-file="pantry/11-the-bayesian-role-scorer-cajal.md"/></metadata>
  <defs>
