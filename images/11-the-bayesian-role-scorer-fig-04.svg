  <rect x="40" y="146" width="86" height="30" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="83" y="165" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">model judgment</text>
  <rect x="40" y="196" width="86" height="30" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="83" y="215" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">user input</text>

