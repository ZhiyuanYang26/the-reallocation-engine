  </defs>

  <rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>
  <line x1="350" y1="48" x2="350" y2="372" stroke="#D4D4D4" stroke-width="1"/>

  <text x="175" y="66" text-anchor="middle" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#2a1a0e">Auditable scorer</text>
  <text x="525" y="66" text-anchor="middle" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#2a1a0e">Opaque scorer</text>

