<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-03">
  <title id="fig-title-03">The Payroll-Tax Cost Inversion</title>
  <desc>Two bars on a shared zero-based axis for two hires of equal wage. The domestic worker bar carries the employer's matching payroll-tax segment on top; the training-authorized hire omits that segment and sits lower. The authorized hire costs less, not more.</desc>
  <metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="The Reallocation Engine" book-slug="the-reallocation-engine" chapter="12-the-opt-framing-generator" figure-number="03" figure-title="The Payroll-Tax Cost Inversion" figure-slug="payroll-tax-cost-inversion" figure-type="statistical/quantitative" priority="Important" author="Nik Bear Brown" date-generated="2026-06-15" source-file="pantry/12-the-opt-framing-generator-cajal.md"/></metadata>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2a1a0e"/></marker>
  </defs>

  <rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>

  <text x="350" y="40" text-anchor="middle" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#2a1a0e">Employer payroll-tax burden at equal wage</text>

  <!-- plot region -->
  <rect x="120" y="60" width="440" height="280" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="0.75"/>

  <!-- zero-based axis -->
  <line x1="120" y1="340" x2="560" y2="340" stroke="#2a1a0e" stroke-width="1.5"/>
  <line x1="120" y1="340" x2="120" y2="60" stroke="#2a1a0e" stroke-width="1.5"/>
  <text x="104" y="200" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e" transform="rotate(-90 104 200)">employer cost</text>

  <!-- bar 1: domestic worker = wage base + matching segment -->
  <!-- wage base portion -->
  <rect x="200" y="170" width="120" height="170" fill="#ADADAD" stroke="#2a1a0e" stroke-width="1"/>
  <!-- matching payroll-tax segment (top) -->
  <rect x="200" y="130" width="120" height="40" fill="#2a1a0e" stroke="#2a1a0e" stroke-width="1"/>
  <text x="260" y="360" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">domestic worker</text>

  <!-- bar 2: training-authorized = wage base only -->
  <rect x="380" y="170" width="120" height="170" fill="#ADADAD" stroke="#2a1a0e" stroke-width="1"/>
  <!-- missing segment marked as saving -->
  <rect x="380" y="130" width="120" height="40" fill="#FFFFFF" stroke="#C8102E" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="440" y="155" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#C8102E">saving</text>
  <text x="440" y="360" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">training-authorized</text>

  <!-- legend -->
  <rect x="120" y="376" width="12" height="12" fill="#ADADAD"/>
  <text x="138" y="386" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">wage base (equal)</text>
  <rect x="280" y="376" width="12" height="12" fill="#2a1a0e"/>
  <text x="298" y="386" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">employer matching payroll-tax segment</text>

  <text x="440" y="118" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#C8102E">cheaper, not more expensive</text>
