<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t1 d1" font-family="Inter, sans-serif">
  <title id="t1">The fork before the human</title>
  <desc id="d1">From "Submit résumé" the path forks before any human judgment: an ATS-parseable document is extracted cleanly and reaches human review and interview, while a designed layout scrambles in the parser and is auto-rejected with no human ever opening it.</desc>
  <rect width="700" height="420" fill="#FFFFFF"/>
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#2a1a0e"/>
    </marker>
  </defs>

  <!-- start -->
  <rect x="280" y="24" width="140" height="40" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1.5"/>
  <text x="350" y="49" text-anchor="middle" font-size="14" fill="#2a1a0e">Submit résumé</text>

  <!-- fork lines -->
  <line x1="350" y1="64" x2="175" y2="100" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="350" y1="64" x2="525" y2="100" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- LEFT path: ATS-parseable -->
  <text x="175" y="118" text-anchor="middle" font-size="12" font-weight="700" fill="#C8102E">ATS-parseable</text>
  <g font-size="12" fill="#2a1a0e">
    <rect x="70" y="128" width="210" height="38" fill="#F5F5F5" stroke="#D4D4D4"/>
    <text x="175" y="152" text-anchor="middle">Parser extracts name/title/dates</text>
    <line x1="175" y1="166" x2="175" y2="194" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arr)"/>
    <rect x="95" y="198" width="160" height="38" fill="#FFFFFF" stroke="#D4D4D4"/>
    <text x="175" y="222" text-anchor="middle">Human review</text>
    <line x1="175" y1="236" x2="175" y2="264" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arr)"/>
    <rect x="110" y="268" width="130" height="40" fill="#FFFFFF" stroke="#C8102E" stroke-width="1.5"/>
    <text x="175" y="293" text-anchor="middle" fill="#C8102E">Interview</text>
  </g>

  <!-- RIGHT path: designed layout -->
  <text x="525" y="118" text-anchor="middle" font-size="12" font-weight="700" fill="#545454">Designed layout</text>
  <g font-size="12" fill="#545454">
    <rect x="420" y="128" width="210" height="38" fill="#F5F5F5" stroke="#D4D4D4"/>
    <text x="525" y="152" text-anchor="middle">Parser sees scrambled text</text>
    <line x1="525" y1="166" x2="525" y2="194" stroke="#545454" stroke-width="1.5" marker-end="url(#arr)"/>
    <rect x="450" y="198" width="150" height="38" fill="#F5F5F5" stroke="#D4D4D4"/>
    <text x="525" y="222" text-anchor="middle">Auto-reject</text>
    <line x1="525" y1="236" x2="525" y2="264" stroke="#545454" stroke-width="1.5" marker-end="url(#arr)"/>
    <rect x="430" y="268" width="190" height="40" fill="#F5F5F5" stroke="#D4D4D4"/>
    <text x="525" y="293" text-anchor="middle">No human opens it</text>
  </g>

  <!-- the fork note -->
  <line x1="40" y1="350" x2="660" y2="350" stroke="#C8860E" stroke-width="2"/>
  <text x="350" y="378" text-anchor="middle" font-size="13" fill="#2a1a0e" font-family="EB Garamond, Georgia, serif" font-style="italic">The fork happens before any human judgment.</text>
</svg>
