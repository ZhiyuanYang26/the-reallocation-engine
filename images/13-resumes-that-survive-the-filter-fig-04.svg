<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t4 d4" font-family="Inter, sans-serif">
  <title id="t4">Two-stage résumé job: parse floor, then human</title>
  <desc id="d4">A two-stage model. Stage 1 is the ATS filter, whose criterion is whether the parser can find your name, title, and dates. Stage 2 is human review, whose criterion is whether the content is specific and true enough to earn a call. Surviving Stage 1 is the floor; Stage 2 is where content quality decides.</desc>
  <rect width="700" height="420" fill="#FFFFFF"/>
  <defs>
    <marker id="arr4" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2a1a0e"/>
    </marker>
  </defs>

  <!-- Stage 1 -->
  <rect x="50" y="100" width="240" height="160" fill="#F5F5F5" stroke="#2a1a0e" stroke-width="1.5"/>
  <text x="170" y="92" text-anchor="middle" font-size="13" font-weight="700" fill="#545454">STAGE 1</text>
  <text x="170" y="138" text-anchor="middle" font-size="18" fill="#2a1a0e" font-family="EB Garamond, Georgia, serif">ATS filter</text>
  <text x="170" y="178" text-anchor="middle" font-size="12" fill="#545454">Criterion:</text>
  <text x="170" y="200" text-anchor="middle" font-size="12" fill="#2a1a0e">Can the parser find your</text>
  <text x="170" y="218" text-anchor="middle" font-size="12" fill="#2a1a0e">name, title, and dates?</text>
  <text x="170" y="246" text-anchor="middle" font-size="11" fill="#545454" font-style="italic">the floor</text>

  <!-- arrow -->
  <line x1="290" y1="180" x2="410" y2="180" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arr4)"/>

  <!-- Stage 2 -->
  <rect x="410" y="100" width="240" height="160" fill="#FFFFFF" stroke="#C8102E" stroke-width="1.5"/>
  <text x="530" y="92" text-anchor="middle" font-size="13" font-weight="700" fill="#545454">STAGE 2</text>
  <text x="530" y="138" text-anchor="middle" font-size="18" fill="#C8102E" font-family="EB Garamond, Georgia, serif">Human review</text>
  <text x="530" y="178" text-anchor="middle" font-size="12" fill="#545454">Criterion:</text>
  <text x="530" y="200" text-anchor="middle" font-size="12" fill="#2a1a0e">Is the content specific and</text>
  <text x="530" y="218" text-anchor="middle" font-size="12" fill="#2a1a0e">true enough to earn a call?</text>
  <text x="530" y="246" text-anchor="middle" font-size="11" fill="#C8102E" font-style="italic">where quality decides</text>

  <!-- caption -->
  <line x1="50" y1="320" x2="650" y2="320" stroke="#C8860E" stroke-width="2"/>
  <text x="350" y="348" text-anchor="middle" font-size="13" fill="#2a1a0e" font-family="EB Garamond, Georgia, serif" font-style="italic">What survives Stage 1 is the floor; Stage 2 is where content quality decides.</text>
</svg>
