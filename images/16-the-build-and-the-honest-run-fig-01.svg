<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t1 d1" font-family="Inter, sans-serif">
  <title id="t1">Six build phases: AI executes, you verify</title>
  <desc id="d1">Six build phases in sequence — foundation, core skeleton, integration, full feature build, hardening, release. Each phase has an AI-executes row and a you-verify row, separated by a handoff condition that must be stated precisely before proceeding.</desc>
  <rect width="700" height="420" fill="#FFFFFF"/>
  <defs>
    <marker id="a16" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#545454"/>
    </marker>
  </defs>

  <text x="20" y="64" font-size="11" font-weight="700" fill="#C8102E">AI executes</text>
  <text x="20" y="200" font-size="11" font-weight="700" fill="#2a1a0e">You verify</text>

  <g font-size="10">
    <!-- 6 phases -->
    <!-- positions -->
    <!-- phase template -->
    <!-- foundation -->
    <g>
      <rect x="100" y="74" width="86" height="44" fill="#FBECEE" stroke="#C8102E"/>
      <text x="143" y="92" text-anchor="middle" fill="#2a1a0e">scaffold</text>
      <text x="143" y="106" text-anchor="middle" fill="#2a1a0e">structure</text>
      <rect x="100" y="210" width="86" height="44" fill="#F5F5F5" stroke="#2a1a0e"/>
      <text x="143" y="228" text-anchor="middle" fill="#2a1a0e">intake</text>
      <text x="143" y="242" text-anchor="middle" fill="#2a1a0e">answers</text>
      <text x="143" y="64" text-anchor="middle" font-size="9" fill="#545454" font-weight="700">1 Foundation</text>
    </g>
    <!-- core -->
    <g transform="translate(96,0)">
      <rect x="100" y="74" width="86" height="44" fill="#FBECEE" stroke="#C8102E"/>
      <text x="143" y="92" text-anchor="middle" fill="#2a1a0e">schemas,</text>
      <text x="143" y="106" text-anchor="middle" fill="#2a1a0e">stubs</text>
      <rect x="100" y="210" width="86" height="44" fill="#F5F5F5" stroke="#2a1a0e"/>
      <text x="143" y="228" text-anchor="middle" fill="#2a1a0e">encode your</text>
      <text x="143" y="242" text-anchor="middle" fill="#2a1a0e">situation</text>
      <text x="143" y="64" text-anchor="middle" font-size="9" fill="#545454" font-weight="700">2 Skeleton</text>
    </g>
    <!-- integration -->
    <g transform="translate(192,0)">
      <rect x="100" y="74" width="86" height="44" fill="#FBECEE" stroke="#C8102E"/>
      <text x="143" y="92" text-anchor="middle" fill="#2a1a0e">wire</text>
      <text x="143" y="106" text-anchor="middle" fill="#2a1a0e">components</text>
      <rect x="100" y="210" width="86" height="44" fill="#F5F5F5" stroke="#2a1a0e"/>
      <text x="143" y="228" text-anchor="middle" fill="#2a1a0e">gates not</text>
      <text x="143" y="242" text-anchor="middle" fill="#2a1a0e">votes</text>
      <text x="143" y="64" text-anchor="middle" font-size="9" fill="#545454" font-weight="700">3 Integration</text>
    </g>
    <!-- feature build -->
    <g transform="translate(288,0)">
      <rect x="100" y="74" width="86" height="44" fill="#FBECEE" stroke="#C8102E"/>
      <text x="143" y="92" text-anchor="middle" fill="#2a1a0e">build each</text>
      <text x="143" y="106" text-anchor="middle" fill="#2a1a0e">pipeline</text>
      <rect x="100" y="210" width="86" height="44" fill="#F5F5F5" stroke="#2a1a0e"/>
      <text x="143" y="228" text-anchor="middle" fill="#2a1a0e">verify vs</text>
      <text x="143" y="242" text-anchor="middle" fill="#2a1a0e">real data</text>
      <text x="143" y="64" text-anchor="middle" font-size="9" fill="#545454" font-weight="700">4 Features</text>
    </g>
    <!-- hardening -->
    <g transform="translate(384,0)">
      <rect x="100" y="74" width="86" height="44" fill="#FBECEE" stroke="#C8102E"/>
      <text x="143" y="92" text-anchor="middle" fill="#2a1a0e">errors,</text>
      <text x="143" y="106" text-anchor="middle" fill="#2a1a0e">audits</text>
      <rect x="100" y="210" width="86" height="44" fill="#F5F5F5" stroke="#2a1a0e"/>
      <text x="143" y="228" text-anchor="middle" fill="#2a1a0e">define</text>
      <text x="143" y="242" text-anchor="middle" fill="#2a1a0e">"correct"</text>
      <text x="143" y="64" text-anchor="middle" font-size="9" fill="#545454" font-weight="700">5 Hardening</text>
    </g>
    <!-- release -->
    <g transform="translate(480,0)">
      <rect x="100" y="74" width="86" height="44" fill="#FFFFFF" stroke="#C8102E" stroke-width="1.5"/>
      <text x="143" y="100" text-anchor="middle" fill="#C8102E">first run</text>
      <text x="143" y="64" text-anchor="middle" font-size="9" fill="#545454" font-weight="700">6 Release</text>
    </g>
  </g>

  <!-- handoff arrows between phases (between verify rows) -->
  <g>
    <line x1="186" y1="160" x2="194" y2="160" stroke="#545454" stroke-width="1" marker-end="url(#a16)"/>
    <line x1="282" y1="160" x2="290" y2="160" stroke="#545454" stroke-width="1" marker-end="url(#a16)"/>
    <line x1="378" y1="160" x2="386" y2="160" stroke="#545454" stroke-width="1" marker-end="url(#a16)"/>
    <line x1="474" y1="160" x2="482" y2="160" stroke="#545454" stroke-width="1" marker-end="url(#a16)"/>
    <line x1="570" y1="160" x2="578" y2="160" stroke="#545454" stroke-width="1" marker-end="url(#a16)"/>
  </g>
  <text x="380" y="150" text-anchor="middle" font-size="9" fill="#C8860E">handoff condition between every phase</text>

  <line x1="40" y1="356" x2="660" y2="356" stroke="#C8860E" stroke-width="2"/>
  <text x="350" y="382" text-anchor="middle" font-size="13" font-family="EB Garamond, Georgia, serif" font-style="italic" fill="#2a1a0e">A handoff you can't state precisely is a phase you haven't actually finished.</text>
</svg>
