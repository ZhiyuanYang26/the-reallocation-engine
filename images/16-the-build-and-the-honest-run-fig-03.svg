<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t3 d3" font-family="Inter, sans-serif">
  <title id="t3">The gate-as-vote bug caught by plausibility audit</title>
  <desc id="d3">A timeline factor wrongly treated as a weighted vote lets a role past its OPT window score Consider; treated correctly as a multiplier, the same role zeroes out and scores Skip. The plausibility audit catches the difference the code cannot.</desc>
  <rect width="700" height="420" fill="#FFFFFF"/>

  <!-- WRONG: gate as vote -->
  <text x="40" y="36" font-size="14" font-weight="700" fill="#545454">Bug: timeline as a vote</text>
  <rect x="40" y="50" width="290" height="240" fill="#F5F5F5" stroke="#D4D4D4"/>
  <g font-size="12" fill="#2a1a0e">
    <text x="58" y="84">sponsorship 0.9  ✓</text>
    <text x="58" y="112">fit 0.7  ✓</text>
    <text x="58" y="140">liveness 1.0  ✓</text>
    <text x="58" y="168" fill="#545454">timeline 0.0  (past OPT)</text>
    <text x="58" y="208" font-family="JetBrains Mono, monospace">composite ≈ 0.70</text>
    <rect x="58" y="226" width="120" height="34" fill="#FFFFFF" stroke="#545454"/>
    <text x="118" y="248" text-anchor="middle" fill="#545454">Consider</text>
    <text x="190" y="248" font-size="11" fill="#545454">looks reasonable, wrong</text>
  </g>

  <!-- RIGHT: gate as multiplier -->
  <text x="370" y="36" font-size="14" font-weight="700" fill="#C8102E">Fixed: timeline as a gate</text>
  <rect x="370" y="50" width="290" height="240" fill="#FFFFFF" stroke="#C8102E" stroke-width="1.5"/>
  <g font-size="12" fill="#2a1a0e">
    <text x="388" y="84">sponsorship 0.9  ✓</text>
    <text x="388" y="112">fit 0.7  ✓</text>
    <text x="388" y="140">liveness 1.0  ✓</text>
    <text x="388" y="168" fill="#C8102E">× timeline 0.0  (gate closed)</text>
    <text x="388" y="208" font-family="JetBrains Mono, monospace">composite → 0</text>
    <rect x="388" y="226" width="120" height="34" fill="#FFFFFF" stroke="#C8102E"/>
    <text x="448" y="248" text-anchor="middle" fill="#C8102E">Skip</text>
    <text x="520" y="248" font-size="11" fill="#545454">correct</text>
  </g>

  <line x1="40" y1="338" x2="660" y2="338" stroke="#C8860E" stroke-width="2"/>
  <text x="350" y="364" text-anchor="middle" font-size="13" font-family="EB Garamond, Georgia, serif" font-style="italic" fill="#2a1a0e">The code ran and the number looked reasonable — only the audit caught it.</text>
</svg>
